<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Analytics - Final Fix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }

        .header { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .h-left h1 { font-size: 20px; font-weight: 600; }
        .top-metrics { display: flex; gap: 30px; }
        .tm-v { display: block; font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono'; color: var(--accent); }
        .tm-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 30px; background: #090c10; border-bottom: 1px solid var(--border); }
        .filter-group { display: flex; gap: 10px; }
        
        .dropdown { position: relative; width: 160px; }
        .dd-btn { 
            width: 100%; padding: 10px 14px; background: var(--surface); 
            border: 1px solid var(--border); color: var(--text); border-radius: 6px;
            cursor: pointer; text-align: left; font-size: 12px; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
        }
        .dd-btn::after { content: '▼'; font-size: 8px; color: var(--text-dim); }
        .dd-menu { 
            position: absolute; top: 110%; left: 0; width: 100%; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; z-index: 1001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown.open .dd-menu { display: block; }

        .li { padding: 10px 14px; display: flex; align-items: center; gap: 10px; font-size: 12px; cursor: pointer; color: var(--text-dim); border-bottom: 1px solid rgba(255,255,255,0.02); }
        .li:hover { background: #21262d; color: var(--text); }
        .chk { width: 14px; height: 14px; border: 2px solid var(--border); border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .li.active .chk { background: var(--accent); border-color: var(--accent); }
        .li.active .chk::after { content: '✓'; color: #000; font-size: 10px; font-weight: 900; }
        .li.active { color: var(--text); background: rgba(56, 189, 248, 0.05); }

        .btn-box { display: flex; gap: 8px; }
        .btn { padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--border); }
        .btn-live { background: rgba(56, 189, 248, 0.1); color: var(--accent); border-color: var(--accent); }
        .btn-reset { background: rgba(248, 81, 73, 0.1); color: var(--red); border-color: rgba(248, 81, 73, 0.2); }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 20px 30px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .card.red { border-left-color: var(--red); }
        .card.green { border-left-color: var(--green); }
        .c-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block; }
        .c-v { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono'; }

        .tag-area { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 30px 10px 30px; min-height: 35px; }
        .tag { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); color: var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 10px; display: flex; align-items: center; gap: 6px; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; display: none; }
        .spinner { width: 30px; height: 30px; border: 3px solid #30363d; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="font-size:11px; color:var(--text-dim); margin-top:10px">SYNCING LIVE DATA...</p></div>

<div class="header">
    <div class="h-left"><h1>OJT Operational Analytics</h1></div>
    <div class="top-metrics">
        <div class="tm-item"><span class="tm-v" id="h-hc">0</span><span class="tm-l">Total HC</span></div>
        <div class="tm-item"><span class="tm-v" id="h-at" style="color:var(--red)">0</span><span class="tm-l">Total Attrition</span></div>
    </div>
</div>

<div class="nav-bar">
    <div class="filter-group">
        <div class="dropdown" id="dd-process"><button class="dd-btn" onclick="toggleDD('dd-process')">Process</button><div class="dd-menu" id="list-process"></div></div>
        <div class="dropdown" id="dd-type"><button class="dd-btn" onclick="toggleDD('dd-type')">Type</button><div class="dd-menu" id="list-type"></div></div>
        <div class="dropdown" id="dd-trainer"><button class="dd-btn" onclick="toggleDD('dd-trainer')">Trainer</button><div class="dd-menu" id="list-trainer"></div></div>
        <div class="dropdown" id="dd-month"><button class="dd-btn" onclick="toggleDD('dd-month')">Month</button><div class="dd-menu" id="list-month"></div></div>
    </div>
    <div class="btn-box">
        <button class="btn btn-live" onclick="loadData(true)">⚡ Live Refresh</button>
        <button class="btn btn-reset" onclick="resetAll()">✕ Reset All</button>
    </div>
</div>

<div class="tag-area" id="tag-box"></div>

<div class="kpi-grid">
    <div class="card"><span class="c-l">Target HC</span><div class="c-v" id="k-target">0</div></div>
    <div class="card"><span class="c-l">Actual HC</span><div class="c-v" id="k-hc">0</div></div>
    <div class="card red"><span class="c-l">Attrition Count</span><div class="c-v" id="k-at">0</div></div>
    <div class="card green"><span class="c-l">Conversion %</span><div class="c-v" id="k-cv">0%</div></div>
    <div class="card"><span class="c-l">Certification %</span><div class="c-v" id="k-cert">0%</div></div>
    <div class="card"><span class="c-l">Training Days</span><div class="c-v" id="k-days">0</div></div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    const MONTH_MAP = {"Jan":0,"Feb":1,"Mar":2,"Apr":3,"May":4,"Jun":5,"Jul":6,"Aug":7,"Sep":8,"Oct":9,"Nov":10,"Dec":11};
    
    let RAW_DATA = [];
    let FILTERS = { process: [], type: [], trainer: [], month: [] };

    // Close dropdowns on outside click
    window.onclick = (e) => { 
        if (!e.target.closest('.dropdown')) {
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        }
    }

    function toggleDD(id) {
        const el = document.getElementById(id);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        if(!isOpen) el.classList.add('open');
    }

    async function loadData(isRefresh = false) {
        if(isRefresh) document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(`${URL}&cb=${Date.now()}`);
            const text = await res.text();
            
            // Clean parsing
            const rows = text.split(/\r?\n/).map(r => r.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()));
            const header = rows[0].map(h => h.toLowerCase());

            // Key Column Index Finder
            const idx = {
                proc: header.indexOf("process"),
                trn: header.indexOf("trainer name"),
                typ: header.indexOf("batch type"),
                mth: header.indexOf("month"),
                tgt: header.indexOf("target headcount"),
                act: header.indexOf("headcount"),
                atr: header.indexOf("attrition"),
                crt: header.indexOf("certification %"),
                day: header.indexOf("training days"),
                cnv: header.indexOf("conversion %")
            };

            RAW_DATA = rows.slice(1).map(c => ({
                process: c[idx.proc] || "N/A",
                trainer: c[trn] || "N/A", // Fallback for specific trainer column
                trainer: c[idx.trn] || "N/A",
                type: c[idx.typ] || "N/A",
                month: c[idx.mth] || "",
                target: parseFloat(c[idx.tgt]) || 0,
                hc: parseFloat(c[idx.act]) || 0,
                at: parseFloat(c[idx.atr]) || 0,
                cert: parseFloat(c[idx.crt]) || 0,
                days: parseFloat(c[idx.day]) || 0,
                cv: parseFloat(c[idx.cnv]) || 0
            })).filter(d => d.month !== "");

            renderSlicers();
            updateDashboard();
        } catch (e) { console.error("CSV Parse Error", e); }
        setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
    }

    function renderSlicers() {
        Object.keys(FILTERS).forEach(key => {
            let items = [...new Set(RAW_DATA.map(d => d[key]))].filter(v => v && v !== "N/A");
            
            if(key === 'month') {
                items.sort((a,b) => {
                    const [mA, yA] = a.split("'"); const [mB, yB] = b.split("'");
                    const yearDiff = (parseInt(yA) || 0) - (parseInt(yB) || 0);
                    return yearDiff || (MONTH_MAP[mA] - MONTH_MAP[mB]);
                });
            } else items.sort();

            const container = document.getElementById('list-' + key);
            container.innerHTML = items.map(val => `
                <div class="li ${FILTERS[key].includes(val) ? 'active' : ''}" 
                     onclick="event.stopPropagation(); toggleFilter('${key}', '${val}')">
                    <div class="chk"></div><span>${val}</span>
                </div>
            `).join('');
        });
    }

    function toggleFilter(key, val) {
        const i = FILTERS[key].indexOf(val);
        if(i > -1) FILTERS[key].splice(i, 1); else FILTERS[key].push(val);
        renderSlicers(); 
        updateDashboard();
    }

    function resetAll() {
        FILTERS = { process: [], type: [], trainer: [], month: [] };
        renderSlicers(); 
        updateDashboard();
    }

    function updateDashboard() {
        const data = RAW_DATA.filter(d => 
            (!FILTERS.process.length || FILTERS.process.includes(d.process)) &&
            (!FILTERS.type.length || FILTERS.type.includes(d.type)) &&
            (!FILTERS.trainer.length || FILTERS.trainer.includes(d.trainer)) &&
            (!FILTERS.month.length || FILTERS.month.includes(d.month))
        );

        const s = data.reduce((a, c) => {
            a.t += c.target; a.h += c.hc; a.a += c.at; 
            a.v += c.cv; a.c += c.cert; a.d += c.days; return a;
        }, { t:0, h:0, a:0, v:0, c:0, d:0 });

        const count = data.length || 1;

        document.getElementById('h-hc').innerText = Math.round(s.h).toLocaleString();
        document.getElementById('h-at').innerText = Math.round(s.a).toLocaleString();
        document.getElementById('k-target').innerText = Math.round(s.t).toLocaleString();
        document.getElementById('k-hc').innerText = Math.round(s.h).toLocaleString();
        document.getElementById('k-at').innerText = Math.round(s.a).toLocaleString();
        document.getElementById('k-cv').innerText = (s.v / count).toFixed(1) + "%";
        document.getElementById('k-cert').innerText = (s.c / count).toFixed(1) + "%";
        document.getElementById('k-days').innerText = Math.round(s.d).toLocaleString();

        const box = document.getElementById('tag-box');
        box.innerHTML = '';
        Object.keys(FILTERS).forEach(k => {
            FILTERS[k].forEach(v => {
                const t = document.createElement('div'); t.className = 'tag';
                t.innerHTML = `${v} <span onclick="toggleFilter('${k}', '${v}')" style="cursor:pointer;margin-left:5px">×</span>`;
                box.appendChild(t);
            });
        });
    }

    loadData();
</script>
</body>
</html>
