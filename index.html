<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>OJT Training Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
        :root {
            --bg:#0c0f1a; --surface:#141824; --surface2:#1c2235; --surface3:#232b42;
            --border:#2a3450; --border2:#3a4a6a; --text:#e8edf5; --text2:#8a9bc4;
            --text3:#5a6a8a; --accent:#4f8ef7; --green:#2dd4a0; --red:#f05a5a;
            --r:12px; --rs:8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
        
        /* Header */
        .header { background: linear-gradient(135deg,#0d1530 0%,#1a2550 50%,#0d1530 100%); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
        .header h1 { font-size: 19px; font-weight: 700; background: linear-gradient(135deg,#fff 0%,#8ab4f8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hstats { display: flex; gap: 20px; }
        .hstat { text-align: center; }
        .hstat .v { font-size: 20px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
        .hstat .l { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }

        /* Slicers */
        .slicer-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; position: sticky; top: 57px; z-index: 150; }
        .dd-wrap { display: flex; flex-direction: column; gap: 4px; position: relative; }
        .dd-wrap label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
        .dd-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: var(--rs); padding: 6px 10px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; min-width: 150px; }
        .dd-panel { position: absolute; top: calc(100% + 4px); left: 0; min-width: 200px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); z-index: 300; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .dd-panel.open { display: flex; }
        .dd-list { max-height: 200px; overflow-y: auto; padding: 4px 0; }
        .dd-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; }
        .dd-item:hover { background: var(--surface3); }
        .dd-item input { accent-color: var(--accent); pointer-events: none; }
        .btn-reset { background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); border-radius: var(--rs); padding: 6px 14px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .btn-reset:hover { background: var(--accent); color: #fff; }

        /* Main Grid */
        .main { padding: 20px 24px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
