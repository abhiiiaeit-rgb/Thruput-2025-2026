<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Operational Analytics | Production Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap');
        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .header { padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .h-metrics { display: flex; gap: 20px; }
        .hm-v { display: block; font-size: 20px; font-weight: 800; font-family: 'JetBrains Mono'; }
        .hm-l { font-size: 8px; color: var(--text-dim); text-transform: uppercase; }
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 30px; }
        .m-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .m-card .val { font-size: 24px; font-weight: 700; display: block; }
        .m-card .lab { font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 30px 30px; }
        .chart-box { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 10px; height: 300px; }
        table { width: calc(100% - 60px); margin: 0 30px 40px; border-collapse: collapse; background: var(--surface); font-size: 12px; }
        th { padding: 12px; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); text-align: left; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loader"><h2 style="font-family:JetBrains Mono; color:var(--accent)">SYNCING LIVE DATA...</h2></div>

<div class="header">
    <div style="text-transform: uppercase; font-weight: 800; letter-spacing: 1px;">OJT <span>Analytics</span></div>
    <div class="h-metrics">
        <div><span class="hm-v" id="h-hc">0</span><span class="hm-l">Headcount</span></div>
        <div><span class="hm-v" id="h-at" style="color:var(--red)">0</span><span class="hm-l">Attrition</span></div>
        <div><span class="hm-v" id="h-cv" style="color:var(--green)">0%</span><span class="hm-l">Conv%</span></div>
    </div>
</div>

<div class="metrics-grid">
    <div class="m-card"><span class="lab">Total Batches</span><span class="val" id="m-bat">0</span></div>
    <div class="m-card"><span class="lab">Live Headcount</span><span class="val" id="m-hc">0</span></div>
    <div class="m-card" style="border-left-color:var(--red)"><span class="lab">Total Attrition</span><span class="val" id="m-at" style="color:var(--red)">0</span></div>
    <div class="m-card" style="border-left-color:var(--green)"><span class="lab">Weighted Conv %</span><span class="val" id="m-cv" style="color:var(--green)">0%</span></div>
</div>

<div class="charts">
    <div class="chart-box"><h4>HC by Trainer</h4><canvas id="ch-hc"></canvas></div>
    <div class="chart-box"><h4>Attrition % by Trainer</h4><canvas id="ch-at"></canvas></div>
</div>

<table>
    <thead><tr><th>Batch</th><th>Trainer</th><th>Month</th><th>HC</th><th>AT</th><th>Conv%</th></tr></thead>
    <tbody id="t-body"></tbody>
</table>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    let charts = {};

    async function loadData() {
        try {
            // CACHE BUSTER: Append timestamp to the URL to force Google to serve fresh data
            const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
            const text = await response.text();
            const rows = text.split(/\r?\n/).map(r => r.split(','));

            // DATA VALIDATOR: Skip the first 4 rows and filter out empty/total rows
            const cleanData = rows.slice(4).map(c => {
                const batchName = (c[0]||"").trim();
                return {
                    batch: batchName,
                    trainer: (c[2]||"").trim(),
                    month: (c[5]||"").trim(),
                    hc: parseFloat(c[8]) || 0, // Column I
                    at: parseFloat(c[9]) || 0, // Column J
                    cv: parseFloat(c[11]) || 0 // Column L
                };
            }).filter(d => 
                d.batch !== "" && 
                !d.batch.toLowerCase().includes("total") && 
                !d.batch.toLowerCase().includes("batches") &&
                d.hc > 0 // Ensures we only count actual entries
            );

            render(cleanData);
        } catch (e) {
            console.error("Sync Error:", e);
        }
        document.getElementById('loader').style.display = 'none';
    }

    function render(data) {
        const total = data.reduce((a, b) => { a.h += b.hc; a.at += b.at; return a; }, { h: 0, at: 0 });
        const conv = total.h > 0 ? (((total.h - total.at) / total.h) * 100).toFixed(1) : 0;

        document.getElementById('h-hc').innerText = document.getElementById('m-hc').innerText = total.h;
        document.getElementById('h-at').innerText = document.getElementById('m-at').innerText = total.at;
        document.getElementById('h-cv').innerText = document.getElementById('m-cv').innerText = conv + "%";
        document.getElementById('m-bat').innerText = data.length;

        document.getElementById('t-body').innerHTML = data.map(d => `
            <tr>
                <td><b>${d.batch}</b></td>
                <td>${d.trainer}</td>
                <td>${d.month}</td>
                <td>${d.hc}</td>
                <td>${d.at}</td>
                <td>${d.cv}%</td>
            </tr>
        `).join('');

        updateCharts(data);
    }

    function updateCharts(data) {
        const trns = [...new Set(data.map(d => d.trainer))].slice(0, 6);
        const hcData = trns.map(t => data.filter(d => d.trainer === t).reduce((a, b) => a + b.hc, 0));
        const atData = trns.map(t => {
            const f = data.filter(d => d.trainer === t);
            const sumHC = f.reduce((a, b) => a + b.hc, 0);
            const sumAT = f.reduce((a, b) => a + b.at, 0);
            return sumHC > 0 ? ((sumAT / sumHC) * 100).toFixed(1) : 0;
        });

        const common = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };

        if(charts.hc) charts.hc.destroy();
        charts.hc = new Chart(document.getElementById('ch-hc'), {
            type: 'bar',
            data: { labels: trns, datasets: [{ data: hcData, backgroundColor: '#38bdf8' }] },
            options: common
        });

        if(charts.at) charts.at.destroy();
        charts.at = new Chart(document.getElementById('ch-at'), {
            type: 'bar',
            data: { labels: trns, datasets: [{ data: atData, backgroundColor: '#f85149' }] },
            options: common
        });
    }

    loadData();
</script>
</body>
</html>
