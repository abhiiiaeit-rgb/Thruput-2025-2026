<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Training Dashboard - Pro Black</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #0d1117; 
            --surface: #161b22; 
            --accent: #38bdf8;
            --border: #30363d; 
            --text: #e6edf3; 
            --text-dim: #8b949e;
            --red: #f85149; 
            --green: #3fb950;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; line-height: 1.5; }

        /* Header Style */
        .header { padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .h-left h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
        .h-left p { font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono'; margin-top: 4px; text-transform: uppercase; }
        .top-metrics { display: flex; gap: 40px; }
        .tm-v { display: block; font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono'; color: var(--text); }
        .tm-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* Fixed Slicer Grid (Second Image Style) */
        .slicer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px 30px; background: #090c10; border-bottom: 1px solid var(--border); }
        .s-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; height: 220px; display: flex; flex-direction: column; }
        .s-head { padding: 10px 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
        .s-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        
        /* List Items with Checkbox Style */
        .li { padding: 8px 15px; display: flex; align-items: center; gap: 12px; font-size: 12px; cursor: pointer; transition: 0.1s; color: var(--text-dim); }
        .li:hover { background: #21262d; color: var(--text); }
        .chk { width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .li.active .chk { background: var(--accent); border-color: var(--accent); }
        .li.active .chk::after { content: '✓'; color: #000; font-size: 11px; font-weight: 900; }
        .li.active { color: var(--text); font-weight: 600; }

        /* blue Tags Section */
        .tag-area { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 30px; min-height: 45px; }
        .tag { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); color: var(--accent); padding: 4px 12px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 8px; }
        .tag span { cursor: pointer; font-weight: bold; opacity: 0.7; }
        .tag span:hover { opacity: 1; color: var(--red); }

        /* KPI Display */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; padding: 10px 30px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 8px; position: relative; }
        .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); border-radius: 8px 0 0 8px; }
        .card.red::before { background: var(--red); }
        .card.green::before { background: var(--green); }
        .c-l { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 12px; display: block; }
        .c-v { font-size: 36px; font-weight: 700; font-family: 'JetBrains Mono'; }

        .reset-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="font-size:12px; color:var(--text-dim)">SYNCING LIVE DATA...</p></div>

<div class="header">
    <div class="h-left"><h1>OJT Dashboard</h1><p id="status-text">Operational Live Feed</p></div>
    <div class="top-metrics">
        <div class="tm-item"><span class="tm-v" id="h-hc">0</span><span class="tm-l">Headcount</span></div>
        <div class="tm-item"><span class="tm-v" id="h-at">0</span><span class="tm-l">Attrition</span></div>
        <button class="reset-btn" onclick="location.reload()">↺ RESET</button>
    </div>
</div>

<div class="slicer-grid">
    <div class="s-box"><div class="s-head">🏭 Process</div><div class="s-list" id="list-process"></div></div>
    <div class="s-box"><div class="s-head">⚡ Batch Type</div><div class="s-list" id="list-type"></div></div>
    <div class="s-box"><div class="s-head">👤 Trainer Name</div><div class="s-list" id="list-trainer"></div></div>
    <div class="s-box"><div class="s-head">📅 Timeline</div><div class="s-list" id="list-month"></div></div>
</div>

<div class="tag-area" id="tag-box"></div>

<div class="kpi-grid">
    <div class="card"><span class="c-l">Total Batches</span><div class="c-v" id="k-batches">0</div></div>
    <div class="card"><span class="c-l">Total Headcount</span><div class="c-v" id="k-hc">0</div></div>
    <div class="card red"><span class="c-l">Total Attrition</span><div class="c-v" id="k-at">0</div></div>
    <div class="card green"><span class="c-l">Avg. Conversion %</span><div class="c-v" id="k-cv">0%</div></div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv&cache=" + Date.now();
    const MONTH_REF = {"Jan":0, "Feb":1, "Mar":2, "Apr":3, "May":4, "Jun":5, "Jul":6, "Aug":7, "Sep":8, "Oct":9, "Nov":10, "Dec":11};
    
    let RAW_DATA = [];
    let FILTERS = { process: [], type: [], trainer: [], month: [] };

    async function loadData() {
        try {
            const res = await fetch(URL);
            const csv = await res.text();
            const lines = csv.split(/\r?\n/).map(line => line.split(','));

            RAW_DATA = lines.slice(1).map(c => ({
                process: (c[1] || "").trim(),
                trainer: (c[2] || "").trim(),
                type: (c[4] || "").trim(),
                month: (c[5] || "").trim(),
                hc: parseFloat(c[8]) || 0,
                attr: parseFloat(c[10]) || 0,
                conv: parseFloat(c[19]) || 0
            })).filter(d => d.month !== "");

            document.getElementById('loader').style.display = 'none';
            renderSlicers();
            updateDashboard();
        } catch (e) {
            document.getElementById('status-text').innerHTML = "<span style='color:red'>FEED ERROR</span>";
        }
    }

    function renderSlicers() {
        Object.keys(FILTERS).forEach(key => {
            let items = [...new Set(RAW_DATA.map(d => d[key]))].filter(v => v);
            
            // Fixed Chronological Sort: Year (24/25) then Month (Jan-Dec)
            if(key === 'month') {
                items.sort((a,b) => {
                    const [mA, yA] = a.split("'");
                    const [mB, yB] = b.split("'");
                    return (parseInt(yA) - parseInt(yB)) || (MONTH_REF[mA] - MONTH_REF[mB]);
                });
            } else { items.sort(); }

            const container = document.getElementById('list-' + key);
            container.innerHTML = items.map(val => `
                <div class="li ${FILTERS[key].includes(val) ? 'active' : ''}" onclick="toggleItem('${key}', '${val}')">
                    <div class="chk"></div>
                    <span>${val}</span>
                </div>
            `).join('');
        });
    }

    function toggleItem(key, val) {
        const idx = FILTERS[key].indexOf(val);
        if(idx > -1) FILTERS[key].splice(idx, 1);
        else FILTERS[key].push(val);
        
        renderSlicers();
        updateDashboard();
    }

    function updateDashboard() {
        const filtered = RAW_DATA.filter(d => 
            (!FILTERS.process.length || FILTERS.process.includes(d.process)) &&
            (!FILTERS.type.length || FILTERS.type.includes(d.type)) &&
            (!FILTERS.trainer.length || FILTERS.trainer.includes(d.trainer)) &&
            (!FILTERS.month.length || FILTERS.month.includes(d.month))
        );

        const sums = filtered.reduce((a, c) => {
            a.hc += c.hc; a.at += c.attr; a.cv += c.conv; return a;
        }, { hc:0, at:0, cv:0 });

        const avgCv = filtered.length ? (sums.cv / filtered.length).toFixed(1) : 0;

        // UI Values
        document.getElementById('h-hc').innerText = Math.round(sums.hc);
        document.getElementById('h-at').innerText = Math.round(sums.at);
        document.getElementById('k-batches').innerText = filtered.length;
        document.getElementById('k-hc').innerText = Math.round(sums.hc);
        document.getElementById('k-at').innerText = Math.round(sums.at);
        document.getElementById('k-cv').innerText = avgCv + "%";

        // Blue Selection Tags
        const box = document.getElementById('tag-box');
        box.innerHTML = '';
        Object.keys(FILTERS).forEach(k => {
            FILTERS[k].forEach(v => {
                const t = document.createElement('div');
                t.className = 'tag';
                t.innerHTML = `${v} <span onclick="toggleItem('${k}', '${v}')">×</span>`;
                box.appendChild(t);
            });
        });
    }

    loadData();
</script>
</body>
</html>
