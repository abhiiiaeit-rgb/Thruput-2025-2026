<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>OJT Training Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
        :root {
            --bg:#0c0f1a; --surface:#141824; --surface2:#1c2235; --surface3:#232b42;
            --border:#2a3450; --border2:#3a4a6a; --text:#e8edf5; --text2:#8a9bc4;
            --text3:#5a6a8a; --accent:#4f8ef7; --red:#f05a5a; --r:12px; --rs:8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        /* Persistent Loader Fix */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Header Icons */
        .header { background: linear-gradient(135deg,#0d1530 0%,#1a2550 50%,#0d1530 100%); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .hstats { display: flex; gap: 20px; }
        .hstat { text-align: right; }
        .hstat .v { font-size: 20px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
        .hstat .l { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }

        /* Slicer Bar & Icons */
        .slicer-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 16px; align-items: flex-end; position: sticky; top: 57px; z-index: 900; }
        .dd-wrap { position: relative; display: flex; flex-direction: column; gap: 6px; }
        .dd-label-icon { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
        .dd-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: var(--rs); padding: 8px 12px; font-size: 12px; cursor: pointer; min-width: 180px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Dropdown Panel with Search */
        .dd-panel { position: absolute; top: calc(100% + 5px); left: 0; width: 260px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); z-index: 1100; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .dd-panel.open { display: flex; }
        .dd-search-area { padding: 10px; border-bottom: 1px solid var(--border); }
        .dd-search-area input { width: 100%; background: var(--surface3); border: 1px solid var(--border2); color: #fff; padding: 8px; border-radius: 6px; font-size: 12px; outline: none; }
        .dd-controls { padding: 8px 15px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; font-size: 11px; font-weight: 600; }
        .act-sel { color: var(--accent); cursor: pointer; }
        .act-clr { color: var(--red); cursor: pointer; }
        .dd-list { max-height: 220px; overflow-y: auto; padding: 5px 0; }
        .dd-item { padding: 8px 15px; display: flex; align-items: center; gap: 12px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .dd-item:hover { background: var(--surface3); }
        .dd-item input { accent-color: var(--accent); width: 15px; height: 15px; }

        .btn-reset { background: var(--surface3); color: var(--text2); border: 1px solid var(--border2); padding: 8px 18px; border-radius: var(--rs); cursor: pointer; font-size: 12px; margin-left: auto; transition: 0.3s; }
        .btn-reset:hover { background: var(--border); color: #fff; }

        /* KPI Cards */
        .main { padding: 24px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; border-top: 3px solid var(--accent); }
        .kpi-card .lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
        .kpi-card .val { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="l-msg">Initializing Connection...</p>
</div>

<div class="header">
    <div><h1>OJT Training Dashboard</h1><p style="color:var(--text3); font-size:10px;">Live Batch Analytics</p></div>
    <div class="hstats">
        <div class="hstat"><div class="v" id="hBatches">0</div><div class="l">Batches</div></div>
        <div class="hstat"><div class="v" id="hHC">0</div><div class="l">Headcount</div></div>
        <div class="hstat"><div class="v" id="hConv">0%</div><div class="l">Avg Conv%</div></div>
    </div>
</div>

<div class="slicer-bar">
    <div class="dd-wrap">
        <div class="dd-label-icon">🔍 BATCH</div>
        <button class="dd-btn" onclick="toggleDD('dd-batch')"><span id="lbl-batch">All</span> ▾</button>
        <div id="dd-batch" class="dd-panel">
            <div class="dd-search-area"><input type="text" placeholder="Search batches..." onkeyup="filterData('batch', this.value)"></div>
            <div class="dd-controls"><span class="act-sel" onclick="bulk('batch', true)">Select All</span><span class="act-clr" onclick="bulk('batch', false)">Clear</span></div>
            <div class="dd-list" id="list-batch"></div>
        </div>
    </div>

    <div class="dd-wrap">
        <div class="dd-label-icon">🏭 PROCESS</div>
        <button class="dd-btn" onclick="toggleDD('dd-process')"><span id="lbl-process">All</span> ▾</button>
        <div id="dd-process" class="dd-panel">
            <div class="dd-search-area"><input type="text" placeholder="Search processes..." onkeyup="filterData('process', this.value)"></div>
            <div class="dd-controls"><span class="act-sel" onclick="bulk('process', true)">Select All</span><span class="act-clr" onclick="bulk('process', false)">Clear</span></div>
            <div class="dd-list" id="list-process"></div>
        </div>
    </div>

    <div class="dd-wrap">
        <div class="dd-label-icon">👤 TRAINER NAME</div>
        <button class="dd-btn" onclick="toggleDD('dd-trainer')"><span id="lbl-trainer">All</span> ▾</button>
        <div id="dd-trainer" class="dd-panel">
            <div class="dd-search-area"><input type="text" placeholder="Search trainers..." onkeyup="filterData('trainer', this.value)"></div>
            <div class="dd-controls"><span class="act-sel" onclick="bulk('trainer', true)">Select All</span><span class="act-clr" onclick="bulk('trainer', false)">Clear</span></div>
            <div class="dd-list" id="list-trainer"></div>
        </div>
    </div>

    <button class="btn-reset" onclick="resetAll()">↺ Reset All</button>
</div>

<div class="main">
    <div class="kpi-grid">
        <div class="kpi-card"><div class="lbl">Total Batches</div><div class="val" id="k-batches">0</div></div>
        <div class="kpi-card"><div class="lbl">Total Headcount</div><div class="val" id="k-hc">0</div></div>
        <div class="kpi-card"><div class="lbl">Avg Conversion</div><div class="val" id="k-conv">0%</div></div>
    </div>
</div>

<script>
    // Direct Data URL
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    
    let RAW = [];
    let filters = { batch: [], process: [], trainer: [] };

    async function init() {
        try {
            // Fetch directly with a fallback message if it hangs
            const timeout = setTimeout(() => {
                document.getElementById('l-msg').innerText = "Check your 'Publish to Web' settings in Sheets...";
            }, 4000);

            const res = await fetch(sheetURL);
            const text = await res.text();
            clearTimeout(timeout);

            const rows = text.split('\n').map(r => r.split(','));
            RAW = rows.slice(1).map(c => ({
                batch: c[0]?.trim() || "",
                process: c[1]?.trim() || "",
                trainer: c[2]?.trim() || "",
                hc: parseFloat(c[8]) || 0,
                conv: parseFloat(c[19]) || 0
            })).filter(d => d.batch && d.batch.toLowerCase() !== "batch");

            document.getElementById('loader').style.display = 'none';
            renderFilters();
            update();
        } catch (err) {
            document.getElementById('l-msg').innerHTML = "<b>Connection Error</b><br>Please ensure the spreadsheet is Published as CSV.";
        }
    }

    function renderFilters(key = '', search = '') {
        const setup = (fKey, field, target) => {
            if (key && key !== fKey) return;
            const items = [...new Set(RAW.map(d => d[field]))]
                .filter(v => v.toLowerCase().includes(search.toLowerCase()))
                .sort();
            
            document.getElementById(target).innerHTML = items.map(v => `
                <div class="dd-item" onclick="toggleItem('${fKey}', '${v}')">
                    <input type="checkbox" ${filters[fKey].includes(v) ? 'checked' : ''} onclick="event.stopPropagation(); toggleItem('${fKey}', '${v}')">
                    <span>${v}</span>
                </div>
            `).join('');
        };
        setup('batch', 'batch', 'list-batch');
        setup('process', 'process', 'list-process');
        setup('trainer', 'trainer', 'list-trainer');
    }

    function toggleDD(id) {
        const el = document.getElementById(id);
        const isCurrentlyOpen = el.classList.contains('open');
        document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('open'));
        if (!isCurrentlyOpen) el.classList.add('open');
    }

    function toggleItem(key, val) {
        const idx = filters[key].indexOf(val);
        if (idx > -1) filters[key].splice(idx, 1); else filters[key].push(val);
        document.getElementById('lbl-' + key).innerText = filters[key].length ? filters[key].length + ' Selected' : 'All';
        update();
    }

    function filterData(key, val) { renderFilters(key, val); }

    function bulk(key, sel) {
        const fieldMap = { batch: 'batch', process: 'process', trainer: 'trainer' };
        filters[key] = sel ? [...new Set(RAW.map(d => d[fieldMap[key]]))] : [];
        document.getElementById('lbl-' + key).innerText = sel ? 'All Selected' : 'All';
        renderFilters(key);
        update();
    }

    function update() {
        const filtered = RAW.filter(d => 
            (!filters.batch.length || filters.batch.includes(d.batch)) &&
            (!filters.process.length || filters.process.includes(d.process)) &&
            (!filters.trainer.length || filters.trainer.includes(d.trainer))
        );
        
        const totalHC = Math.round(filtered.reduce((a, b) => a + b.hc, 0));
        const avgConv = filtered.length ? (filtered.reduce((a, b) => a + b.conv, 0) / filtered.length * 100).toFixed(1) : 0;

        document.getElementById('hBatches').innerText = filtered.length;
        document.getElementById('k-batches').innerText = filtered.length;
        document.getElementById('hHC').innerText = totalHC;
        document.getElementById('k-hc').innerText = totalHC;
        document.getElementById('hConv').innerText = avgConv + '%';
        document.getElementById('k-conv').innerText = avgConv + '%';
    }

    function resetAll() {
        filters = { batch: [], process: [], trainer: [] };
        document.querySelectorAll('.dd-btn span').forEach(s => s.innerText = 'All');
        renderFilters();
        update();
    }

    // Close dropdowns if clicking outside
    window.onclick = (e) => {
        if (!e.target.closest('.dd-wrap')) {
            document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('open'));
        }
    };

    init();
</script>
</body>
</html>
