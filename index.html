<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OJT Training Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');
        :root { --bg:#0c0f1a;--surface:#141824;--surface2:#1c2235;--surface3:#232b42; --border:#2a3450;--border2:#3a4a6a; --text:#e8edf5;--text2:#8a9bc4;--text3:#5a6a8a; --accent:#4f8ef7;--accent2:#7c5cfc; --green:#2dd4a0;--amber:#f5a623;--red:#f05a5a;--pink:#f06292;--teal:#26c6da; --r:12px;--rs:8px;}
        * {box-sizing:border-box;margin:0;padding:0;}
        body {font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
        .header {background:linear-gradient(135deg,#0d1530 0%,#1a2550 50%,#0d1530 100%);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
        .header h1 {font-size:19px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 0%,#8ab4f8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .header p {font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace;}
        .hstats {display:flex;gap:20px;}
        .hstat .v {font-size:20px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;text-align:center;}
        .hstat .l {font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;text-align:center;}
        .slicer-bar {background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;position:sticky;top:57px;z-index:150;}
        .dd-wrap {display:flex;flex-direction:column;gap:4px;position:relative;}
        .dd-wrap label {font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
        .dd-btn {background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--rs);padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:160px;transition:border-color .2s;}
        .dd-btn:hover,.dd-btn.open {border-color:var(--accent);color:var(--text);}
        .dd-btn .arrow {font-size:9px;transition:transform .2s;flex-shrink:0;}
        .dd-btn.open .arrow {transform:rotate(180deg);}
        .dd-panel {position:absolute;top:calc(100% + 4px);left:0;min-width:200px;max-width:280px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:300;display:none;flex-direction:column;overflow:hidden;}
        .dd-panel.open {display:flex;}
        .dd-search {padding:8px;border-bottom:1px solid var(--border);}
        .dd-search input {width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:var(--rs);padding:5px 8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:11px;outline:none;}
        .dd-list {max-height:200px;overflow-y:auto;padding:4px 0;}
        .dd-item {display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;transition:background .15s;}
        .dd-item:hover {background:var(--surface3);}
        .dd-item input {accent-color:var(--accent);cursor:pointer;}
        .dd-item span {font-size:12px;color:var(--text2);}
        .filter-bar {padding:5px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-height:30px;}
        .ftag-all {font-size:11px;color:var(--text3);}
        .btn-reset {background:var(--surface3);border:1px solid var(--border2);color:var(--text2);border-radius:var(--rs);padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;}
        .btn-reset:hover {background:var(--accent);color:#fff;}
        .tabs {display:flex;gap:2px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:103px;z-index:140;}
        .tab {padding:10px 16px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;}
        .tab.active {color:var(--accent);border-bottom-color:var(--accent);}
        .tab-content {display:none; padding:20px 24px;}
        .tab-content.active {display:block;}
        .kpi-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
        .kpi-card {background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;position:relative;}
        .kpi-card::after {content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
        .kpi-card .lbl {font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:5px;}
        .kpi-card .val {font-size:24px;font-weight:700;font-family:'DM Mono',monospace;}
        .charts-grid {display:grid;gap:14px;grid-template-columns: 1fr 1fr 1fr;}
        .chart-card {background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
        .cw {height:200px; position:relative;}
        table {width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);}
        thead th {background:var(--surface3);color:var(--text3);padding:8px;text-align:left;font-size:10px;}
        tbody td {padding:8px;border-bottom:1px solid var(--border);color:var(--text2);}
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>OJT Training Dashboard</h1>
            <p id="headerSub">Real-time Batch Performance Monitoring</p>
        </div>
        <div class="hstats">
            <div class="hstat"><div class="v" id="hTotal">0</div><div class="l">Batches</div></div>
            <div class="hstat"><div class="v" id="hHC">0</div><div class="l">Headcount</div></div>
            <div class="hstat"><div class="v" id="hAttr">0</div><div class="l">Attrition</div></div>
            <div class="hstat"><div class="v" id="hConv">0%</div><div class="l">Avg Conv%</div></div>
        </div>
    </div>

    <div class="slicer-bar" id="slicerBar">
        <div class="dd-wrap">
            <label>Batch</label>
            <button class="dd-btn" onclick="toggleDD('dd-batch')"><span id="lbl-batch">All</span> <span class="arrow">▼</span></button>
            <div id="dd-batch" class="dd-panel">
                <div class="dd-search"><input type="text" onkeyup="filterList(this, 'list-batch')" placeholder="Search batch..."></div>
                <div class="dd-list" id="list-batch"></div>
            </div>
        </div>
        <div class="dd-wrap">
            <label>Process</label>
            <button class="dd-btn" onclick="toggleDD('dd-process')"><span id="lbl-process">All</span> <span class="arrow">▼</span></button>
            <div id="dd-process" class="dd-panel">
                <div class="dd-search"><input type="text" onkeyup="filterList(this, 'list-process')" placeholder="Search process..."></div>
                <div class="dd-list" id="list-process"></div>
            </div>
        </div>
        <div class="dd-wrap">
            <label>Trainer</label>
            <button class="dd-btn" onclick="toggleDD('dd-trainer')"><span id="lbl-trainer">All</span> <span class="arrow">▼</span></button>
            <div id="dd-trainer" class="dd-panel">
                <div class="dd-search"><input type="text" onkeyup="filterList(this, 'list-trainer')" placeholder="Search trainer..."></div>
                <div class="dd-list" id="list-trainer"></div>
            </div>
        </div>
        <div class="dd-wrap">
            <label>Month</label>
            <button class="dd-btn" onclick="toggleDD('dd-month')"><span id="lbl-month">All</span> <span class="arrow">▼</span></button>
            <div id="dd-month" class="dd-panel">
                <div class="dd-search"><input type="text" onkeyup="filterList(this, 'list-month')" placeholder="Search month..."></div>
                <div class="dd-list" id="list-month"></div>
            </div>
        </div>
        
        <div class="dd-wrap">
            <label>Batch Type</label>
            <button class="dd-btn" onclick="toggleDD('dd-batchtype')"><span id="lbl-batchtype">All</span> <span class="arrow">▼</span></button>
            <div id="dd
