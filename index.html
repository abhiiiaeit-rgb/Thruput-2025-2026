
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>New Hire Training — Operation Thruput</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--panel:#0f1524;--card:#141929;--border:#1e2740;--border2:#2a3555;
  --accent:#4f8ef7;--green:#2dd4a0;--red:#f75f5f;--purple:#a78bfa;
  --yellow:#fbbf24;--orange:#fb923c;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ─ HEADER ─────────────────────────────── */
.hdr{flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--purple));
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.hdr-title{font-size:15px;font-weight:700;}
.hdr-sub{font-size:11px;color:var(--muted2);margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.badge-pill{background:var(--card);border:1px solid var(--border2);border-radius:20px;
  padding:3px 10px;font-size:11px;color:var(--muted2);font-family:var(--mono);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
/* ─ LABEL TOGGLE ─────────────────────── */
.lbl-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.lbl-text{font-size:12px;font-weight:600;color:#ffffff;}
.tog{width:42px;height:24px;border-radius:24px;background:#2d3a52;border:1px solid #3a4d6e;
  position:relative;cursor:pointer;transition:background .25s,border-color .25s;}
.tog.on{background:var(--accent);border-color:var(--accent);}
.tog-dot{position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;
  top:2px;left:2px;transition:left .25s;box-shadow:0 2px 5px rgba(0,0,0,.5);}
.tog.on .tog-dot{left:20px;}
/* ─ SLICERS ─────────────────────────── */
.slicers{flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);
  padding:8px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.sl-wrap{position:relative;}
.sl-btn{background:var(--card);border:1px solid var(--border2);color:var(--muted2);
  border-radius:6px;padding:6px 26px 6px 11px;cursor:pointer;font-family:var(--font);
  font-size:12px;min-width:130px;text-align:left;white-space:nowrap;transition:all .15s;position:relative;}
.sl-btn:after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:9px;}
.sl-btn:hover,.sl-btn.active{border-color:var(--accent);color:var(--text);}
.sl-btn.active{color:var(--accent);background:rgba(79,142,247,.08);}
.sl-drop{position:absolute;top:calc(100% + 4px);left:0;min-width:210px;background:#151d2e;
  border:1px solid var(--border2);border-radius:8px;z-index:9999;display:none;
  flex-direction:column;box-shadow:0 16px 40px rgba(0,0,0,.6);max-height:320px;overflow:hidden;}
.sl-drop.open{display:flex;}
.sl-search{padding:8px;border-bottom:1px solid var(--border);}
.sl-search input{width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:5px;color:var(--text);padding:5px 8px;font-size:11px;font-family:var(--font);outline:none;}
.sl-search input:focus{border-color:var(--accent);}
.sl-acts{display:flex;gap:6px;padding:5px 8px;border-bottom:1px solid var(--border);}
.sl-act{font-size:11px;color:var(--accent);cursor:pointer;background:none;
  border:none;font-family:var(--font);padding:2px 5px;border-radius:3px;}
.sl-act:hover{background:rgba(79,142,247,.12);}
.sl-list{overflow-y:auto;max-height:220px;}
.sl-item{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;}
.sl-item:hover{background:rgba(79,142,247,.07);}
.sl-item input{accent-color:var(--accent);width:13px;height:13px;cursor:pointer;flex-shrink:0;pointer-events:none;}
.sl-item label{cursor:pointer;font-size:11px;color:var(--muted2);pointer-events:none;}
.sl-item:hover label{color:var(--text);}
.clear-btn{background:none;border:1px solid var(--border2);color:var(--muted);
  border-radius:6px;padding:6px 10px;cursor:pointer;font-size:11px;font-family:var(--font);}
.clear-btn:hover{border-color:var(--red);color:var(--red);}
/* ─ KPI CARDS ────────────────────────── */
.kpi-strip{flex-shrink:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:8px;padding:8px 20px;background:var(--bg);border-bottom:1px solid var(--border);}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;position:relative;overflow:hidden;}
.kpi:before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:8px 8px 0 0;}
.kpi.cb:before{background:var(--accent);}
.kpi.cg:before{background:var(--green);}
.kpi.cr:before{background:var(--red);}
.kpi.cp:before{background:var(--purple);}
.kpi.cy:before{background:var(--yellow);}
.kpi.co:before{background:var(--orange);}
.kpi-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.kpi-val{font-size:16px;font-weight:700;font-family:var(--mono);}
.kpi-val.cb{color:var(--accent);}
.kpi-val.cg{color:var(--green);}
.kpi-val.cr{color:var(--red);}
.kpi-val.cp{color:var(--purple);}
.kpi-val.cy{color:var(--yellow);}
.kpi-val.co{color:var(--orange);}
/* ─ TABS ─────────────────────────────── */
.tabs-bar{flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;gap:0;overflow-x:auto;}
.tab-btn{padding:9px 16px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;
  border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s;text-transform:uppercase;letter-spacing:.4px;}
.tab-btn:hover{color:var(--muted2);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
/* ─ MAIN SCROLL AREA ─────────────────── */
.page-wrap{display:flex;flex-direction:column;height:100%;}
.main{flex:1;overflow-y:auto;padding:14px 20px 24px;}
/* ─ CHARTS ───────────────────────────── */
.charts-grid{display:grid;gap:12px;margin-bottom:14px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g1{grid-template-columns:1fr;}
.ch-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;}
.ch-title{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:10px;}
.ch-wrap{position:relative;height:280px;}
/* ─ TABLE ────────────────────────────── */
.tbl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tbl-title{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;}
.tbl-badge{font-size:10px;color:var(--muted);background:var(--card);border:1px solid var(--border);
  padding:2px 8px;border-radius:10px;font-family:var(--mono);}
.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:8px;max-height:400px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead{position:sticky;top:0;z-index:5;}
.th-sec{background:#08101e;color:var(--muted2);font-size:9px;text-transform:uppercase;
  letter-spacing:.5px;padding:5px 8px;border-bottom:1px solid var(--border2);
  text-align:center;font-weight:700;border-left:1px solid var(--border2);border-right:1px solid var(--border2);}
th{background:#0e1627;color:var(--muted);font-weight:600;text-align:left;
  padding:7px 10px;white-space:nowrap;border-bottom:1px solid var(--border);
  font-size:10px;text-transform:uppercase;letter-spacing:.3px;}
tbody tr{border-bottom:1px solid rgba(30,39,64,.6);}
tbody tr:hover{background:rgba(79,142,247,.04);}
td{padding:6px 10px;color:var(--text);white-space:nowrap;font-size:11px;}
td.n{font-family:var(--mono);color:var(--muted2);}
td.g{font-family:var(--mono);color:var(--green);}
td.o{font-family:var(--mono);color:var(--orange);}
td.r{font-family:var(--mono);color:var(--red);}
td.d{color:#2a3555;}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.tag-cert{background:rgba(45,212,160,.12);color:#2dd4a0;border:1px solid rgba(45,212,160,.2);}
.tag-exit{background:rgba(247,95,95,.12);color:#f75f5f;border:1px solid rgba(247,95,95,.2);}
.tag-ojt{background:rgba(79,142,247,.12);color:#4f8ef7;border:1px solid rgba(79,142,247,.2);}
.tag-trng{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.2);}
.tag-trans{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.2);}
.tag-new{background:rgba(45,212,160,.1);color:#2dd4a0;}
.tag-transit{background:rgba(251,191,36,.1);color:#fbbf24;}
.no-data{padding:32px;text-align:center;color:var(--muted);}
/* fetch status */
.fetch-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:4px 20px;
  background:rgba(79,142,247,.06);border-bottom:1px solid var(--border);font-size:11px;
  color:var(--muted2);min-height:26px;}
</style>
</head>

<div class="page-wrap">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">🎓</div>
    <div>
      <div class="hdr-title">New Hire Training — Operation Thruput</div>

    </div>
  </div>
  <div class="hdr-right">
    <div class="badge-pill" id="rcBadge">— rows</div>
    <div style="display:flex;align-items:center;gap:6px;">

    <div class="lbl-wrap" id="lblWrap">

      <span class="lbl-text">Labels</span>

  </div>
</div>

<!-- FETCH STATUS -->
<div class="fetch-bar" id="fetchBar">

</div>

<!-- TABS (moved above slicers) -->
<div class="tabs-bar">
  <button class="tab-btn active" data-tab="batch">Batches</button>
  <button class="tab-btn" data-tab="trng">Training Schedule</button>
  <button class="tab-btn" data-tab="pkt">Quality PKT Certification</button>
  <button class="tab-btn" data-tab="kra">KRA Certification</button>
  <button class="tab-btn" data-tab="exits">Exits — Training Phase</button>
  <button class="tab-btn" data-tab="ojt">OJT Phase Schedule</button>
</div>

<!-- SLICERS -->
<div class="slicers" id="slicersBar">
  <button class="clear-btn" id="clearAllBtn">✕ Clear All</button>
</div>

<!-- OVERALL SUMMARY LABEL -->
<div style="flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);padding:5px 20px;display:flex;align-items:center;gap:8px;">
  <span style="font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.7px;">● Overall Summary</span>
</div>

<!-- KPI STRIP (always visible) -->
<div class="kpi-strip" id="kpiStrip"></div>

<!-- MAIN -->
<div class="main" id="mainArea"></div>

</div><!-- end page-wrap -->

function parseCSVRow(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function parseNum(v, expectPct=false) {
  if (v == null) return null;
  const s = String(v).trim();
  if (!s || s === '-' || s.toLowerCase() === 'n/a') return null;
  const hasPctSign = s.endsWith('%');
  const clean = s.replace('%','').replace(/,/g,'').trim();
  const n = parseFloat(clean);
  if (isNaN(n)) return null;
  // If cell has % sign → already a percentage → divide by 100
  if (hasPctSign) return n / 100;
  // If no % sign but it's a fraction (0–1 range) → keep as-is
  // If no % sign and value looks like a whole-number percentage (e.g. 98) → divide by 100
  if (expectPct && Math.abs(n) > 1.5) return n / 100;
  return n;
}

// TEXT FIELDS (not numeric)
const TEXT_FIELDS = new Set([
  'Batches','Process','Trainer Name','Status','Batch Type',
  'Month','Training Start Date','KRA Certification Status'
]);

// Build CSV column index mapping from header rows (handles hidden/blank GS columns)
function buildCsvColMap(r0, r1, r2) {
  // Build name→indices from each header row
  const makeIdx = (row) => {
    const m = {};
    row.forEach((v, i) => {
      const n = v.trim();
      if (!n) return;
      if (!m[n]) m[n] = [];
      m[n].push(i);
    });
    return m;
  };
  const byR2 = makeIdx(r2);
  const byR1 = makeIdx(r1);

  const csvColMap = {}; // xlsxCol → csvCol
  for (const [xlsxStr, name] of Object.entries(COL_MAP)) {
    const xlsxIdx = parseInt(xlsxStr);
    // Try row 2 first (column headers)
    let candidates = byR2[name] || [];
    if (!candidates.length) candidates = byR1[name] || [];
    
    if (!candidates.length) {
      // Not found by name — use xlsx position as-is (safest fallback)
      csvColMap[xlsxIdx] = xlsxIdx;
    } else if (candidates.length === 1) {
      csvColMap[xlsxIdx] = candidates[0];
    } else {
      // Duplicate name — pick closest candidate to xlsx position
      csvColMap[xlsxIdx] = candidates.reduce((best, c) =>
        Math.abs(c - xlsxIdx) < Math.abs(best - xlsxIdx) ? c : best, candidates[0]);
    }
  }
  return csvColMap;
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  if (lines.length < 4) return [];

  // Parse the 3 header rows to build column map
  const r0 = parseCSVRow(lines[0]);
  const r1 = parseCSVRow(lines[1]);
  const r2 = parseCSVRow(lines[2]);
  const csvColMap = buildCsvColMap(r0, r1, r2);

  const records = [];
  for (let i = 3; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = parseCSVRow(line);
    // Use the batch name col (xlsxIdx=0 → csvColMap[0]) to detect data rows
    const batchCol = csvColMap[0] ?? 0;
    if (!cols[batchCol] || !cols[batchCol].trim()) continue;

    const rec = {};
    for (const [xlsxStr, name] of Object.entries(COL_MAP)) {
      const xlsxIdx = parseInt(xlsxStr);
      const csvIdx = csvColMap[xlsxIdx] ?? xlsxIdx;
      const raw = (cols[csvIdx] || '').trim();
      if (TEXT_FIELDS.has(name)) {
        rec[name] = raw || null;
      } else {
        rec[name] = parseNum(raw, name.includes('%'));
      }
    }
    records.push(rec);
  }
  return records;
}

async function fetchLive() {
  const bar = document.getElementById('fetchBar');
  const status = document.getElementById('fetchStatus');
  const srcLbl = document.getElementById('srcLabel');
  try {
    const resp = await fetch(CSV_URL, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    if (text.includes('<!DOCTYPE') || text.includes('<html')) throw new Error('Got HTML instead of CSV (auth required)');
    const parsed = parseCSV(text);
    if (parsed.length < 5) throw new Error('Too few rows parsed');
    // Sanity check: total HC Day 0 should be > 500 for this dataset
    const totalHC = parsed.reduce((s,r) => s+(r['Headcount (Day 0)']||0),0);
    if (totalHC < 100) throw new Error(`Data looks wrong: total HC Day 0 = ${totalHC}. Column mapping issue.`);
    DATA = parsed;
    status.textContent = `✅ Live data loaded — ${parsed.length} rows from Google Sheets`;
    status.style.color = 'var(--green)';
    srcLbl.textContent = 'Live';
    srcLbl.style.color = 'var(--green)';
    document.getElementById('liveStatus').style.background = 'var(--green)';
    setTimeout(() => { bar.style.display = 'none'; }, 3000);
    refresh();
  } catch(e) {
    status.textContent = `⚠️ Using embedded data (${FALLBACK.length} rows) — Live fetch failed: ${e.message}`;
    status.style.color = 'var(--yellow)';
    srcLbl.textContent = 'Embedded';
    srcLbl.style.color = 'var(--yellow)';
    document.getElementById('liveStatus').style.background = 'var(--yellow)';
    document.getElementById('liveStatus').style.boxShadow = '0 0 6px var(--yellow)';
    DATA = FALLBACK;
    refresh();
  }
}

      <button class="sl-btn" id="sbtn_${id}">${SLICER_LABELS[key]}</button>
      <div class="sl-drop" id="sdrop_${id}">

        <div class="sl-acts">

          <button class="sl-act" data-action="none" data-id="${id}" data-key="${key}">None</button>
        </div>
        <div class="sl-list" id="slist_${id}">
          ${vals.map(v => `<div class="sl-item" data-key="${key}" data-id="${id}"><input type="checkbox"><label>${v}</label></div>`).join('')}
        </div>
      </div>`;
    bar.insertBefore(wrap, clearBtn);
  });

  // ─ Event delegation (no inline handlers, handles apostrophes safely) ─
  document.getElementById('slicersBar').addEventListener('click', e => {
    // Toggle dropdown
    const btn = e.target.closest('.sl-btn');
    if (btn) {
      const id = btn.id.replace('sbtn_','');
      const dd = document.getElementById('sdrop_' + id);
      const wasOpen = dd.classList.contains('open');
      closeAllDrops();
      if (!wasOpen) dd.classList.add('open');
      return;
    }
    // All / None actions
    const act = e.target.closest('.sl-act');
    if (act) {
      const key = act.dataset.key, id = act.dataset.id;
      if (act.dataset.action === 'all') {
        document.querySelectorAll(`#slist_${id} .sl-item`).forEach(item => {
          const lbl = item.querySelector('label').textContent;
          item.querySelector('input').checked = true;
          slicerSel[key].add(lbl);
        });
      } else {
        slicerSel[key].clear();
        document.querySelectorAll(`#slist_${id} input`).forEach(cb => cb.checked = false);
      }
      updateBtn(key, id); refresh(); return;
    }
    // Item click
    const item = e.target.closest('.sl-item');
    if (item) {
      const key = item.dataset.key, id = item.dataset.id;
      const cb = item.querySelector('input');
      const val = item.querySelector('label').textContent;
      cb.checked = !cb.checked;
      if (cb.checked) slicerSel[key].add(val); else slicerSel[key].delete(val);
      updateBtn(key, id); refresh();
    }
    // Clear all
    if (e.target.closest('#clearAllBtn')) clearAll();
  });

  // Search inside slicers
  document.getElementById('slicersBar').addEventListener('input', e => {
    const inp = e.target;
    if (!inp.id || !inp.id.startsWith('ssrch_')) return;
    const listId = 'slist_' + inp.id.replace('ssrch_','');
    const q = inp.value.toLowerCase();
    document.querySelectorAll(`#${listId} .sl-item`).forEach(item => {
      item.style.display = item.querySelector('label').textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  // Close on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.sl-wrap')) closeAllDrops();
  });
}

function renderKPIStrip(data) {
  const totalHC = data.reduce((s,r) => s+(r['Headcount (Day 0)']||0),0);
  const totalEnd = data.reduce((s,r) => s+(r['Count -Trng end']||0),0);
  const totalAttr = data.reduce((s,r) => s+(r['Total Attrition - Training Phase']||0),0);
  const bCount = new Set(data.map(r=>r['Batches'])).size;
  function wavg(f){let n=0,d=0;data.forEach(r=>{const w=r['Headcount (Day 0)']||0;const v=r[f];if(v!=null&&!isNaN(v)){n+=v*w;d+=w;}});return d?n/d:null;}
  const kpis = [
    {l:'Total Batches',v:bCount,f:'n',c:'cb'},
    {l:'Total Headcount (Day 0)',v:totalHC,f:'n',c:'cb'},
    {l:'Total Training End HC',v:totalEnd,f:'n',c:'cg'},
    {l:'Total Attrition (Trng Phase)',v:totalAttr,f:'n',c:'cr'},
    {l:'Avg Attrition %',v:wavg('Attrition %'),f:'p',c:'cr'},
    {l:'Avg Conv % (Trng)',v:wavg('Conversion(Training start to end) %'),f:'p',c:'cg'},
    {l:'Avg PKT Cert %',v:wavg('PKT Certification %'),f:'p',c:'cp'},
    {l:'Avg Thruput Conv %',v:wavg('Thruput Conversion (Trng start to PKT certification) %'),f:'p',c:'cy'},
    {l:'Avg Trng Effectiveness %',v:wavg('Training Effectiveness %'),f:'p',c:'cb'},
  ];
  document.getElementById('kpiStrip').innerHTML = kpis.map(k => `
    <div class="kpi ${k.c}">
      <div class="kpi-lbl">${k.l}</div>
      <div class="kpi-val ${k.c}">${fmt(k.v,k.f)}</div>
    </div>`).join('');
  document.getElementById('rcBadge').textContent = data.length + ' rows';
}

function fmt(v,f='p'){
  if(v===null||v===undefined||isNaN(v)) return '—';
  if(f==='p') return (v*100).toFixed(1)+'%';
  if(f==='n') return Math.round(v).toLocaleString();
  return Number(v).toFixed(2);
}
function fmtPct(v){return v==null||isNaN(v)?null:(v*100).toFixed(1)+'%';}
function td(v,isPct=false){
  if(v===null||v===undefined) return '<td class="d">—</td>';
  if(isPct){
    const n=Number(v);if(isNaN(n)) return '<td class="d">—</td>';
    const cls=n>=0.8?'g':n>=0.5?'o':'r';
    return `<td class="${cls}">${(n*100).toFixed(1)}%</td>`;
  }
  const n=Number(v);
  if(!isNaN(n)&&v!==''){return `<td class="n">${n%1===0?n.toLocaleString():n.toFixed(2)}</td>`;}
  return `<td>${v}</td>`;
}
function stTag(s){
  if(!s) return '<td class="d">—</td>';
  const map={'Certified':'cert','Exit':'exit','OJT Day 1':'ojt','OJT Day 3':'ojt',
    'OJT Day 9':'ojt','Training Day 1':'trng','Batch Transfer':'trans'};
  return `<td><span class="tag tag-${map[s]||'ojt'}">${s}</span></td>`;
}
function tpTag(t){
  if(!t) return '<td class="d">—</td>';
  return `<td><span class="tag tag-${t.toLowerCase()}">${t}</span></td>`;
}
function groupBy(data,gk,vk,agg='wavg',wk='Headcount (Day 0)'){
  const g={};
  data.forEach(r=>{const k=r[gk]||'?';if(!g[k])g[k]={v:[],w:[]};const v=r[vk];if(v!=null&&!isNaN(v)){g[k].v.push(Number(v));g[k].w.push(Number(r[wk])||1);}});
  const res={};
  for(const[k,{v,w}]of Object.entries(g)){
    if(!v.length){res[k]=null;continue;}
    res[k]=agg==='sum'?v.reduce((a,b)=>a+b,0):(()=>{const d=w.reduce((a,b)=>a+b,0);return d?v.reduce((s,x,i)=>s+x*w[i],0)/d:null;})();
  }
  return res;
}

  function sumF(g, key) {
    return data.filter(function(r){return r[gk]===g;}).reduce(function(s,r){return s+(Number(r[key])||0);},0);

    var rows = data.filter(function(r){return r[gk]===g && r[key]!=null && !isNaN(r[key]);});

// ─── SPLIT BAR + LINE CHARTS (separate, clean) ───────────────────────────────
function mkSplitCharts(barId, lineId, data, barFields, lineFields, opts) {
  opts = opts || {};
  var gk = opts.groupKey || 'Process';
  var wk = opts.weightKey || 'Headcount (Day 0)';
  var maxG = opts.maxGroups || 20;
  var groups = [];
  data.forEach(function(r){ if(r[gk] && groups.indexOf(r[gk])===-1) groups.push(r[gk]); });
  groups = groups.slice(0, maxG);
  function sumF(g, key) {
    return data.filter(function(r){return r[gk]===g;}).reduce(function(s,r){return s+(Number(r[key])||0);},0);
  }
  function avgF(g, key) {
    var rows = data.filter(function(r){return r[gk]===g && r[key]!=null && !isNaN(r[key]);});
    if (!rows.length) return null;
    var w = rows.reduce(function(s,r){return s+(Number(r[wk])||1);},0);
    return rows.reduce(function(s,r){return s+(Number(r[key])||0)*(Number(r[wk])||1);},0)/(w||1);
  }
  var BC = ['#4f8ef7','#2dd4a0','#a78bfa','#fbbf24','#f75f5f','#fb923c','#38bdf8','#34d399'];
  var LC = ['#f87171','#fbbf24','#a78bfa','#4f8ef7','#34d399','#fb923c','#e879f9','#22d3ee'];

  // ── BAR CHART (counts) ──
  if (barId) {
    if (chartInst[barId]) { chartInst[barId].destroy(); delete chartInst[barId]; }
    var barEl = document.getElementById(barId);
    if (barEl) {
      var barDS = barFields.map(function(f,i){
        return { label:f.label, data:groups.map(function(g){return sumF(g,f.key);}),
          backgroundColor:BC[i%BC.length]+'bb', borderColor:BC[i%BC.length], borderWidth:1, borderRadius:3 };
      });
      chartInst[barId] = new Chart(barEl.getContext('2d'), {
        type:'bar', data:{labels:groups, datasets:barDS}, plugins:[ChartDataLabels],
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{
            legend:{display:barDS.length>1, position:'top', labels:{color:CC.muted,font:{size:9},boxWidth:8,padding:5}},
            tooltip:{callbacks:{label:function(ctx){var v=ctx.parsed.y; return ' '+ctx.dataset.label+': '+(Number.isInteger(v)?v.toLocaleString():v.toFixed(1));}}},
            datalabels:{display:showLabels, color:'#fff', font:{size:8,weight:'600',family:'"JetBrains Mono",monospace'},
              anchor:'end', align:'top', offset:1, clip:false, formatter:function(v){return v==null?'':Math.round(v);}}
          },
          scales:{
            x:{ticks:{color:CC.muted,font:{size:9},maxRotation:38},grid:{color:'rgba(30,39,64,.5)'},border:{color:CC.border}},
            y:{ticks:{color:CC.muted,font:{size:9}},grid:{color:'rgba(30,39,64,.35)'},border:{color:CC.border},
               title:{display:true,text:'Count',color:CC.muted,font:{size:9}}}
          },
          layout:{padding:{top:showLabels?26:4, right:6}}
        }
      });
    }
  }

  // ── LINE CHART (percentages) ──
  if (lineId) {
    if (chartInst[lineId]) { chartInst[lineId].destroy(); delete chartInst[lineId]; }
    var lineEl = document.getElementById(lineId);
    if (lineEl) {
      var lineDS = lineFields.map(function(f,i){
        return { label:f.label+' %', data:groups.map(function(g){return avgF(g,f.key);}),
          borderColor:LC[i%LC.length], backgroundColor:LC[i%LC.length]+'22',
          borderWidth:2, pointRadius:4, pointHoverRadius:6, tension:0.3, fill:false };
      });
      chartInst[lineId] = new Chart(lineEl.getContext('2d'), {
        type:'line', data:{labels:groups, datasets:lineDS}, plugins:[ChartDataLabels],
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{
            legend:{display:lineDS.length>1, position:'top', labels:{color:CC.muted,font:{size:9},boxWidth:8,padding:5}},
            tooltip:{callbacks:{label:function(ctx){var v=ctx.parsed.y; return v==null?'':' '+ctx.dataset.label+': '+(v*100).toFixed(1)+'%';}}},
            datalabels:{display:showLabels, color:'#fff', font:{size:8,weight:'600',family:'"JetBrains Mono",monospace'},
              anchor:'end', align:'top', offset:1, clip:false, formatter:function(v){return v==null?'':(v*100).toFixed(0)+'%';}}
          },
          scales:{
            x:{ticks:{color:CC.muted,font:{size:9},maxRotation:38},grid:{color:'rgba(30,39,64,.5)'},border:{color:CC.border}},
            y:{ticks:{color:CC.muted,font:{size:9},callback:function(v){return (v*100).toFixed(0)+'%';}},
               grid:{color:'rgba(30,39,64,.35)'},border:{color:CC.border},
               title:{display:true,text:'%',color:CC.muted,font:{size:9}}, min:0}
          },
          layout:{padding:{top:showLabels?26:4, right:6}}
        }
      });
    }
  }
}

// ─── MULTI-SERIES GROUPED BAR ─────────────────────────────────────────────────
function mkGroupedBar(canvasId, labels, datasets, opts) {
  opts = opts || {};
  if (chartInst[canvasId]) { chartInst[canvasId].destroy(); delete chartInst[canvasId]; }
  var el = document.getElementById(canvasId); if (!el) return;
  var isPct = opts.isPct === true;
  chartInst[canvasId] = new Chart(el.getContext('2d'), {
    type:'bar', data:{labels:labels, datasets:datasets}, plugins:[ChartDataLabels],
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true, position:'top', labels:{color:CC.muted,font:{size:9},boxWidth:8,padding:5}},
        tooltip:{callbacks:{label:function(ctx){
          var v=ctx.parsed.y;
          return isPct?' '+ctx.dataset.label+': '+(v*100).toFixed(1)+'%':' '+ctx.dataset.label+': '+v;
        }}},
        datalabels:{display:showLabels, color:'#fff', font:{size:8,weight:'600'},
          anchor:'end', align:'top', offset:1, clip:false,
          formatter:function(v){return v==null?'':(isPct?(v*100).toFixed(0)+'%':Math.round(v));}}
      },
      scales:{
        x:{ticks:{color:CC.muted,font:{size:9},maxRotation:38},grid:{color:'rgba(30,39,64,.5)'},border:{color:CC.border}},
        y:{ticks:{color:CC.muted,font:{size:9},callback:function(v){return isPct?(v*100).toFixed(0)+'%':v;}},
           grid:{color:'rgba(30,39,64,.35)'},border:{color:CC.border}}
      },
      layout:{padding:{top:showLabels?24:4, right:6}}
    }
  });
}

// ── TAB 6: OJT PHASE SCHEDULE ──────────────────────────────
function tabOJT(main,data){
  function avg(f){let s=0,c=0;data.forEach(r=>{const v=r[f];if(v!=null&&!isNaN(v)){s+=v;c++;}});return c?s/c:null;}
  const phases=['1-7d','8-12d','13-17d','18-22d'];
  const rtA=phases.map(p=>avg('OJT '+p+' RT'));
  const qA=phases.map(p=>avg('OJT '+p+' Quality'));
  main.innerHTML=`
    <div class="charts-grid g1" style="margin-bottom:14px">
      <div class="ch-card"><div class="ch-title">OJT RT Avg by Phase</div><div class="ch-wrap"><canvas id="c1"></canvas></div></div>
      <div class="ch-card"><div class="ch-title">OJT Quality Avg by Phase</div><div class="ch-wrap"><canvas id="c2"></canvas></div></div>
    </div>
    <div class="charts-grid g1" style="margin-bottom:14px">
      <div class="ch-card"><div class="ch-title">OJT 1-7d RT Avg by Process</div><div class="ch-wrap"><canvas id="c3"></canvas></div></div>
    </div>
    `;
  const phaseLbls=['1–7 Days\nOJT Learning','8–12 Days\n1st Cert','13–17 Days\n2nd Cert','18–22 Days\n3rd Cert'];
  const df=v=>v!=null?Number(v).toFixed(1):'';
  mkChart('c1','bar',phaseLbls,[{data:rtA,backgroundColor:['rgba(79,142,247,.85)','rgba(79,142,247,.65)','rgba(79,142,247,.5)','rgba(79,142,247,.35)'],borderWidth:0,borderRadius:6}],{isPct:false,datalabelsFmt:df});
  mkChart('c2','bar',phaseLbls,[{data:qA,backgroundColor:['rgba(45,212,160,.85)','rgba(45,212,160,.65)','rgba(45,212,160,.5)','rgba(45,212,160,.35)'],borderWidth:0,borderRadius:6}],{isPct:false,datalabelsFmt:df});
  const rtP=groupBy(data,'Process','OJT 1-7d RT');
  const rpl=Object.keys(rtP).filter(k=>rtP[k]!=null).slice(0,14);
  mkChart('c3','bar',rpl,[{data:rpl.map(l=>rtP[l]),backgroundColor:'rgba(79,142,247,.7)',borderColor:'#4f8ef7',borderWidth:1,borderRadius:4}],{isPct:false,datalabelsFmt:df});
}
