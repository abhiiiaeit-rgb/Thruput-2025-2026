<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Training Dashboard - Fixed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950; --orange: #f0883e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .live-status { font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono'; }
        .top-stats { display: flex; gap: 20px; text-align: right; }
        .ts-item { display: flex; flex-direction: column; }
        .ts-val { font-family: 'JetBrains Mono'; font-size: 20px; font-weight: 700; }
        .ts-lbl { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }

        /* Slicers */
        .slicer-area { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: #090c10; padding: 15px; border-radius: 8px; align-items: flex-end; }
        .s-grp { display: flex; flex-direction: column; gap: 5px; min-width: 160px; position: relative; }
        .s-lbl { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; font-size: 12px; cursor: pointer; outline: none; }
        .btn-reset { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; }

        /* KPI Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .card.red { border-left-color: var(--red); }
        .card.green { border-left-color: var(--green); }
        .card.orange { border-left-color: var(--orange); }
        .c-lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 10px; }
        .c-val { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono'; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 99; }
    </style>
</head>
<body>

<div id="loader">Fetching Live Data...</div>

<div class="header">
    <div>
        <h1>OJT Training Dashboard</h1>
        <div class="live-status" id="status">Live System Active</div>
    </div>
    <div class="top-stats">
        <div class="ts-item"><span class="ts-val" id="h-batches">0</span><span class="ts-lbl">Batches</span></div>
        <div class="ts-item"><span class="ts-val" id="h-hc">0</span><span class="ts-lbl">Headcount</span></div>
        <div class="ts-item"><span class="ts-val" id="h-at">0</span><span class="ts-lbl">Attrition</span></div>
    </div>
</div>

<div class="slicer-area">
    <div class="s-grp"><span class="s-lbl">🔍 Batch</span><select id="sel-batch" onchange="updateDash()"><option value="All">All</option></select></div>
    <div class="s-grp"><span class="s-lbl">⚡ Batch Type</span><select id="sel-type" onchange="updateDash()"><option value="All">All</option></select></div>
    <div class="s-grp"><span class="s-lbl">🏭 Process</span><select id="sel-process" onchange="updateDash()"><option value="All">All</option></select></div>
    <div class="s-grp"><span class="s-lbl">👤 Trainer</span><select id="sel-trainer" onchange="updateDash()"><option value="All">All</option></select></div>
    <div class="s-grp"><span class="s-lbl">📅 Month</span><select id="sel-month" onchange="updateDash()"><option value="All">All</option></select></div>
    <button class="btn-reset" onclick="location.reload()">Reset All</button>
</div>

<div class="grid">
    <div class="card"><span class="c-lbl">Total Batches</span><div class="c-val" id="k-batches">0</div></div>
    <div class="card"><span class="c-lbl">Total Headcount</span><div class="c-val" id="k-hc">0</div></div>
    <div class="card red"><span class="c-lbl">Total Attrition</span><div class="c-val" id="k-at">0</div></div>
    <div class="card green"><span class="c-lbl">Avg Conversion %</span><div class="c-val" id="k-cv">0%</div></div>
    <div class="card orange"><span class="c-lbl">Floor Deployment</span><div class="c-val" id="k-fl">0</div></div>
</div>

<script>
    // 1. ADD YOUR PUBLISHED CSV URL HERE
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    
    let RAW = [];

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL + "&cache=" + new Date().getTime());
            const text = await response.text();
            const rows = text.split('\n').map(r => r.split(','));

            // Column Mapping (Correct these indices if your sheet changes)
            RAW = rows.slice(1).map(c => ({
                batch: (c[0] || "").trim(),
                process: (c[1] || "").trim(),
                trainer: (c[2] || "").trim(),
                type: (c[4] || "").trim(),
                month: (c[5] || "").trim(),
                hc: parseFloat(c[8]) || 0,
                attr: parseFloat(c[10]) || 0,
                conv: parseFloat(c[19]) || 0,
                floor: parseFloat(c[22]) || 0
            })).filter(d => d.batch !== "");

            populateDropdowns();
            updateDash();
            document.getElementById('loader').style.display = 'none';
        } catch (err) {
            document.getElementById('status').innerHTML = "⚠️ Fetch Error";
            console.error(err);
        }
    }

    function populateDropdowns() {
        const fields = { batch: 'sel-batch', type: 'sel-type', process: 'sel-process', trainer: 'sel-trainer', month: 'sel-month' };
        Object.keys(fields).forEach(key => {
            const unique = [...new Set(RAW.map(d => d[key]))].sort();
            const el = document.getElementById(fields[key]);
            unique.forEach(val => {
                if(val) el.innerHTML += `<option value="${val}">${val}</option>`;
            });
        });
    }

    function updateDash() {
        const fBatch = document.getElementById('sel-batch').value;
        const fType = document.getElementById('sel-type').value;
        const fProc = document.getElementById('sel-process').value;
        const fTrain = document.getElementById('sel-trainer').value;
        const fMonth = document.getElementById('sel-month').value;

        const filtered = RAW.filter(d => 
            (fBatch === 'All' || d.batch === fBatch) &&
            (fType === 'All' || d.type === fType) &&
            (fProc === 'All' || d.process === fProc) &&
            (fTrain === 'All' || d.trainer === fTrain) &&
            (fMonth === 'All' || d.month === fMonth)
        );

        const sums = filtered.reduce((acc, curr) => {
            acc.hc += curr.hc; acc.at += curr.attr; acc.cv += curr.conv; acc.fl += curr.floor;
            return acc;
        }, { hc: 0, at: 0, cv: 0, fl: 0 });

        const avgConv = filtered.length ? (sums.cv / filtered.length).toFixed(1) : 0;

        // Update UI
        document.getElementById('h-batches').innerText = filtered.length;
        document.getElementById('k-batches').innerText = filtered.length;
        document.getElementById('h-hc').innerText = Math.round(sums.hc);
        document.getElementById('k-hc').innerText = Math.round(sums.hc);
        document.getElementById('h-at').innerText = Math.round(sums.at);
        document.getElementById('k-at').innerText = Math.round(sums.at);
        document.getElementById('k-cv').innerText = avgConv + "%";
        document.getElementById('k-fl').innerText = Math.round(sums.fl);
    }

    fetchData();
</script>
</body>
</html>
