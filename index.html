<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Hire Thruput Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap');
        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER DESIGN */
        .header { 
            padding: 12px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            background: var(--bg); 
            position: sticky; top: 0; z-index: 1000;
        }
        .h-left { display: flex; align-items: center; gap: 15px; flex: 1; }
        .brand { border-right: 1px solid var(--border); padding-right: 15px; line-height: 1; }
        .brand h1 { font-size: 13px; font-weight: 800; color: #fff; text-transform: uppercase; white-space: nowrap; }
        .brand p { font-size: 9px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-top: 2px; }
        
        .h-summary { font-family: 'JetBrains Mono'; font-size: 10.5px; color: var(--text-dim); white-space: nowrap; }
        .h-summary span { color: var(--accent); font-weight: 700; }

        .h-right { display: flex; align-items: center; gap: 20px; }
        .hk-item { display: flex; flex-direction: column; align-items: flex-end; line-height: 1; }
        .hk-v { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono'; color: #fff; }
        .hk-l { font-size: 8px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-top: 3px; }

        /* NAV BAR */
        .nav-bar { display: flex; gap: 8px; padding: 10px 30px; background: #090c10; border-bottom: 1px solid var(--border); align-items: center; }
        .dropdown { position: relative; width: 140px; }
        .dd-btn { width: 100%; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; text-align: left; font-size: 11px; font-weight: 600; display: flex; justify-content: space-between; }
        .dd-menu { position: absolute; top: 115%; left: 0; width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; max-height: 300px; overflow-y: auto; display: none; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown.open .dd-menu { display: block; }
        .dd-actions { display: flex; border-bottom: 1px solid var(--border); }
        .dd-actions button { flex: 1; padding: 8px; background: transparent; border: none; color: var(--accent); font-size: 9px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        .li { padding: 8px 12px; display: flex; align-items: center; gap: 10px; font-size: 11px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .li:hover { background: #21262d; }
        .li.active { color: var(--accent); }
        .chk { width: 13px; height: 13px; border: 1px solid var(--border); border-radius: 3px; }
        .li.active .chk { background: var(--accent); border-color: var(--accent); }

        /* KPI GRID */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; padding: 20px 30px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .c-l { font-size: 8px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 6px; display: block; }
        .c-v { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono'; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 25px; height: 25px; border: 2px solid #30363d; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:12px; font-size:10px; color:var(--text-dim);">LOADING CORES...</p></div>

<div class="header">
    <div class="h-left">
        <div class="brand"><h1>New Hire</h1><p>Thruput Live</p></div>
        <div class="h-summary" id="h-sum-text">Connecting...</div>
    </div>
    <div class="h-right">
        <div class="hk-item"><span class="hk-v" id="h-count">0</span><span class="hk-l">Batches</span></div>
        <div class="hk-item"><span class="hk-v" id="h-hc">0</span><span class="hk-l">Headcount</span></div>
        <div class="hk-item"><span class="hk-v" id="h-at" style="color:var(--red)">0</span><span class="hk-l">Attrition</span></div>
        <div class="hk-item"><span class="hk-v" id="h-conv" style="color:var(--green)">0%</span><span class="hk-l">Avg Conv%</span></div>
    </div>
</div>

<div class="nav-bar">
    <div class="dropdown" id="dd-batch"><button class="dd-btn" onclick="toggleDD('dd-batch')">🔍 Batch</button><div class="dd-menu"><div class="dd-actions"><button onclick="bulk('batch',1)">All</button><button onclick="bulk('batch',0)">Clear</button></div><div id="list-batch"></div></div></div>
    <div class="dropdown" id="dd-process"><button class="dd-btn" onclick="toggleDD('dd-process')">🏭 Process</button><div class="dd-menu"><div class="dd-actions"><button onclick="bulk('process',1)">All</button><button onclick="bulk('process',0)">Clear</button></div><div id="list-process"></div></div></div>
    <div class="dropdown" id="dd-trainer"><button class="dd-btn" onclick="toggleDD('dd-trainer')">👤 Trainer</button><div class="dd-menu"><div id="list-trainer"></div></div></div>
    <div class="dropdown" id="dd-month"><button class="dd-btn" onclick="toggleDD('dd-month')">📅 Month</button><div class="dd-menu"><div id="list-month"></div></div></div>
    <button onclick="loadData(true)" style="padding:7px 12px; background:transparent; border:1px solid var(--border); color:var(--text); border-radius:6px; font-size:10px; font-weight:800; cursor:pointer; margin-left:auto;">REFRESH</button>
</div>

<div class="kpi-grid">
    <div class="card"><span class="c-l">Target HC</span><div class="c-v" id="k-target">0</div></div>
    <div class="card"><span class="c-l">Actual HC</span><div class="c-v" id="k-hc">0</div></div>
    <div class="card" style="border-left-color:var(--red)"><span class="c-l">Attrition</span><div class="c-v" id="k-at">0</div></div>
    <div class="card" style="border-left-color:var(--green)"><span class="c-l">Conversion %</span><div class="c-v" id="k-cv">0%</div></div>
    <div class="card"><span class="c-l">Certification %</span><div class="c-v" id="k-cert">0%</div></div>
    <div class="card"><span class="c-l">Training Days</span><div class="c-v" id="k-days">0</div></div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    let RAW = [], FILTERS = { batch: [], process: [], trainer: [], month: [] };

    window.onclick = (e) => { if (!e.target.closest('.dropdown')) document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open')); }
    function toggleDD(id) {
        const el = document.getElementById(id);
        const isO = el.classList.contains('open');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        if(!isO) el.classList.add('open');
    }

    async function loadData(ref = false) {
        if(ref) document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(`${URL}&cb=${Date.now()}`);
            const text = await res.text();
            
            const rows = text.split(/\r?\n/).map(row => {
                let res = [], cell = '', inQ = false;
                for (let char of row) {
                    if (char === '"') inQ = !inQ;
                    else if (char === ',' && !inQ) { res.push(cell.trim()); cell = ''; }
                    else cell += char;
                }
                res.push(cell.trim()); return res;
            });

            // DATA MAPPING BASED ON YOUR INPUT (Column A=0, B=1, C=2...)
            // Finding the row where actual data starts (Look for "Batch" in Column A)
            let startIdx = rows.findIndex(r => r[0] && r[0].toLowerCase().includes("batch") && !r[0].toLowerCase().includes("analytics"));
            
            // If it can't find "Batch", it skips the top 2 decorative rows by default
            if(startIdx === -1) startIdx = 2; 

            // Find metric columns by scanning the header row
            const header = rows[startIdx].map(h => h.toLowerCase());
            const find = (k) => header.findIndex(h => h.includes(k));

            // Metric Indices (Usually further right in your sheet)
            const idxTG = find("target");
            const idxHC = find("headcount");
            const idxAT = find("attrition");
            const idxCR = find("cert");
            const idxCV = find("conv");
            const idxDY = find("days");

            RAW = rows.slice(startIdx + 1).map(c => {
                const n = (v) => {
                    if(!v) return 0;
                    let val = parseFloat(String(v).replace(/[^0-9.]/g, ''));
                    return isNaN(val) ? 0 : val;
                };
                return {
                    batch: c[0] || "N/A",      // Column A
                    process: c[1] || "N/A",    // Column B
                    trainer: c[2] || "N/A",    // Column C
                    status: c[3] || "",        // Column D
                    type: c[4] || "",          // Column E
                    month: c[5] || "",         // Column F
                    target: n(c[idxTG]),
                    hc: n(c[idxHC]),
                    at: n(c[idxAT]),
                    cert: n(c[idxCR]),
                    days: n(c[idxDY]),
                    cv: n(c[idxCV])
                };
            }).filter(d => d.month && d.month.length > 2);

            renderSlicers(); update();
        } catch (e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderSlicers() {
        ['batch', 'process', 'trainer', 'month'].forEach(key => {
            const items = [...new Set(RAW.map(d => d[key]))].filter(v => v && v !== "N/A").sort((a,b) => a.localeCompare(b, undefined, {numeric:true}));
            document.getElementById('list-' + key).innerHTML = items.map(v => `
                <div class="li ${FILTERS[key].includes(v)?'active':''}" onclick="event.stopPropagation();toggleItem('${key}','${v.replace(/'/g, "\\'")}')">
                    <div class="chk"></div><span>${v}</span>
                </div>`).join('');
        });
    }

    function toggleItem(k, v) {
        const i = FILTERS[k].indexOf(v);
        if(i > -1) FILTERS[k].splice(i, 1); else FILTERS[k].push(v);
        renderSlicers(); update();
    }

    function bulk(k, all) {
        FILTERS[k] = all ? [...new Set(RAW.map(d => d[k]))] : [];
        renderSlicers(); update();
    }

    function update() {
        const data = RAW.filter(d => 
            (!FILTERS.batch.length || FILTERS.batch.includes(d.batch)) &&
            (!FILTERS.process.length || FILTERS.process.includes(d.process)) &&
            (!FILTERS.trainer.length || FILTERS.trainer.includes(d.trainer)) &&
            (!FILTERS.month.length || FILTERS.month.includes(d.month))
        );

        const s = data.reduce((a, c) => {
            a.t += c.target; a.h += c.hc; a.a += c.at; a.v += c.cv; a.c += c.cert; a.d += c.days; return a;
        }, { t:0, h:0, a:0, v:0, c:0, d:0 });

        const count = data.length || 1;
        
        // Header Summary Calculation
        const bNums = data.map(d => parseInt(d.batch.replace(/\D/g,''))).filter(n => !isNaN(n));
        const bRange = bNums.length ? `Batch ${Math.min(...bNums)} → ${Math.max(...bNums)}` : 'N/A';
        const months = [...new Set(data.map(d => d.month))];
        const mRange = months.length > 1 ? `${months[0]} – ${months[months.length-1]}` : (months[0] || 'N/A');
        const trn = [...new Set(data.map(d => d.trainer))].length;
        const prc = [...new Set(data.map(d => d.process))].length;

        document.getElementById('h-sum-text').innerHTML = `(<span>${bRange}</span> · <span>${mRange}</span> · <span>${trn} Trainers</span> · <span>${prc} Processes</span>)`;

        // Top Right KPI Line
        document.getElementById('h-count').innerText = data.length;
        document.getElementById('h-hc').innerText = Math.round(s.h).toLocaleString();
        document.getElementById('h-at').innerText = Math.round(s.a).toLocaleString();
        document.getElementById('h-conv').innerText = (s.v / count).toFixed(1) + "%";

        // KPI Cards
        document.getElementById('k-target').innerText = Math.round(s.t).toLocaleString();
        document.getElementById('k-hc').innerText = Math.round(s.h).toLocaleString();
        document.getElementById('k-at').innerText = Math.round(s.a).toLocaleString();
        document.getElementById('k-cv').innerText = (s.v / count).toFixed(1) + "%";
        document.getElementById('k-cert').innerText = (s.c / count).toFixed(1) + "%";
        document.getElementById('k-days').innerText = Math.round(s.d).toLocaleString();
    }

    loadData();
</script>
</body>
</html>
