<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Training Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap');
        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        .header { 
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: flex-end; 
            border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000;
        }
        .h-left { flex: 1; }
        .h-left h1 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .h-summary { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-dim); }
        .h-summary span { color: var(--accent); }

        .h-right { display: flex; gap: 30px; align-items: center; }
        .hk-item { text-align: center; }
        .hk-v { display: block; font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono'; color: var(--accent); }
        .hk-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }

        /* SLICER NAV */
        .nav-bar { display: flex; gap: 12px; padding: 15px 30px; background: #090c10; border-bottom: 1px solid var(--border); align-items: center; }
        .dropdown { position: relative; width: 160px; }
        .dd-label { font-size: 9px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        .dd-btn { width: 100%; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; text-align: left; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        
        .dd-menu { position: absolute; top: 110%; left: 0; width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; max-height: 350px; overflow-y: auto; display: none; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown.open .dd-menu { display: block; }
        .dd-actions { display: flex; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 10; }
        .dd-actions button { flex: 1; padding: 10px; background: transparent; border: none; color: var(--accent); font-size: 9px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        .li { padding: 10px 12px; display: flex; align-items: center; gap: 10px; font-size: 11px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .li:hover { background: #21262d; }
        .li.active { color: var(--accent); font-weight: 600; }
        .chk { width: 14px; height: 14px; border: 1px solid var(--border); border-radius: 3px; position: relative; }
        .li.active .chk { background: var(--accent); border-color: var(--accent); }
        .li.active .chk::after { content: '✓'; color: #000; font-size: 10px; position: absolute; left: 2px; top: -1px; font-weight: 900; }

        /* STATUS BAR - NEW */
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 30px; background: #0d1117; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }
        .status-bar span { font-family: 'JetBrains Mono'; color: var(--text); }

        /* KPI SECTION */
        .section-drop { padding: 25px 30px; background: linear-gradient(180deg, #090c10 0%, #0d1117 100%); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 10px; border-left: 4px solid var(--accent); }
        .c-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        .c-v { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono'; color: #fff; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 30px; height: 30px; border: 3px solid #30363d; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:15px; font-size:11px; color:var(--text-dim); letter-spacing: 1px;">REFRESHING OJT ANALYTICS...</p></div>

<div class="header">
    <div class="h-left">
        <h1>OJT Training Dashboard</h1>
        <div class="h-summary" id="h-sum-text">Syncing data range...</div>
    </div>
    <div class="h-right">
        <div class="hk-item"><span class="hk-v" id="h-count">0</span><span class="hk-l">Batches</span></div>
        <div class="hk-item"><span class="hk-v" id="h-hc">0</span><span class="hk-l">Headcount</span></div>
        <div class="hk-item"><span class="hk-v" id="h-at" style="color:var(--red)">0</span><span class="hk-l">Attrition</span></div>
        <div class="hk-item"><span class="hk-v" id="h-conv" style="color:var(--green)">0%</span><span class="hk-l">Avg Conv%</span></div>
    </div>
</div>

<div class="nav-bar">
    <div class="dropdown" id="dd-batch"><div class="dd-label">🔍 Batch</div><button class="dd-btn" onclick="toggleDD('dd-batch')">All <span>▼</span></button><div class="dd-menu"><div class="dd-actions"><button onclick="bulk('batch',1)">Select All</button><button onclick="bulk('batch',0)">Reset</button></div><div id="list-batch"></div></div></div>
    <div class="dropdown" id="dd-process"><div class="dd-label">🏭 Process</div><button class="dd-btn" onclick="toggleDD('dd-process')">All <span>▼</span></button><div class="dd-menu"><div class="dd-actions"><button onclick="bulk('process',1)">Select All</button><button onclick="bulk('process',0)">Reset</button></div><div id="list-process"></div></div></div>
    <div class="dropdown" id="dd-trainer"><div class="dd-label">👤 Trainer</div><button class="dd-btn" onclick="toggleDD('dd-trainer')">All <span>▼</span></button><div class="dd-menu"><div class="dd-actions"><button onclick="bulk('trainer',1)">Select All</button><button onclick="bulk('trainer',0)">Reset</button></div><div id="list-trainer"></div></div></div>
    <div class="dropdown" id="dd-type"><div class="dd-label">⚡ Type</div><button class="dd-btn" onclick="toggleDD('dd-type')">All <span>▼</span></button><div class="dd-menu"><div class="dd-actions"><button onclick="bulk('type',1)">Select All</button><button onclick="bulk('type',0)">Reset</button></div><div id="list-type"></div></div></div>
    <div class="dropdown" id="dd-month"><div class="dd-label">📅 Month</div><button class="dd-btn" onclick="toggleDD('dd-month')">All <span>▼</span></button><div class="dd-menu"><div class="dd-actions"><button onclick="bulk('month',1)">Select All</button><button onclick="bulk('month',0)">Reset</button></div><div id="list-month"></div></div></div>
    <button onclick="loadData(true)" style="padding:10px 18px; background:var(--accent); border:none; color:#000; border-radius:6px; font-size:11px; font-weight:800; cursor:pointer; margin-left:auto;">LIVE REFRESH</button>
</div>

<div class="status-bar">
    <div id="status-text">Showing all records</div>
    <div id="status-count"><span>0</span> / <span>0</span> batches</div>
</div>

<div class="section-drop">
    <div class="kpi-grid">
        <div class="card"><span class="c-l">Target HC</span><div class="c-v" id="k-target">0</div></div>
        <div class="card"><span class="c-l">Actual HC</span><div class="c-v" id="k-hc">0</div></div>
        <div class="card" style="border-left-color:var(--red)"><span class="c-l">Attrition Count</span><div class="c-v" id="k-at">0</div></div>
        <div class="card" style="border-left-color:var(--green)"><span class="c-l">Conversion %</span><div class="c-v" id="k-cv">0.0%</div></div>
        <div class="card"><span class="c-l">Certification %</span><div class="c-v" id="k-cert">0.0%</div></div>
        <div class="card"><span class="c-l">Training Days</span><div class="c-v" id="k-days">0</div></div>
    </div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    let RAW = [], FILTERS = { batch: [], process: [], trainer: [], month: [], type: [] };
    const monthOrder = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    function toggleDD(id) {
        const el = document.getElementById(id);
        const isO = el.classList.contains('open');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        if(!isO) el.classList.add('open');
    }

    async function loadData(ref = false) {
        if(ref) document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(`${URL}&cb=${Date.now()}`);
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(','));
            
            // Map columns strictly
            RAW = rows.slice(3).map(c => ({
                batch: c[0] || "N/A", process: c[1] || "N/A", trainer: c[2] || "N/A",
                type: c[4] || "New", month: c[5] || "", target: parseFloat(c[6]) || 0,
                hc: parseFloat(c[7]) || 0, at: parseFloat(c[8]) || 0, cert: parseFloat(c[9]) || 0,
                cv: parseFloat(c[10]) || 0, days: parseFloat(c[11]) || 0
            })).filter(d => d.month);

            renderSlicers(); update();
        } catch (e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderSlicers() {
        ['batch', 'process', 'trainer', 'month', 'type'].forEach(key => {
            let items = [...new Set(RAW.map(d => d[key]))].sort();
            if(key === 'month') {
                items.sort((a,b) => {
                    const [m1, y1] = a.split("'"), [m2, y2] = b.split("'");
                    return y1 !== y2 ? y1 - y2 : monthOrder.indexOf(m1) - monthOrder.indexOf(m2);
                });
            }
            document.getElementById('list-' + key).innerHTML = items.map(v => `
                <div class="li ${FILTERS[key].includes(v)?'active':''}" onclick="toggleItem('${key}','${v}')">
                    <div class="chk"></div><span>${v}</span>
                </div>`).join('');
        });
    }

    function toggleItem(k, v) {
        const i = FILTERS[k].indexOf(v);
        if(i > -1) FILTERS[k].splice(i, 1); else FILTERS[k].push(v);
        update(); renderSlicers();
    }

    function bulk(k, all) {
        FILTERS[k] = all ? [...new Set(RAW.map(d => d[k]))] : [];
        update(); renderSlicers();
    }

    function update() {
        const data = RAW.filter(d => 
            (!FILTERS.batch.length || FILTERS.batch.includes(d.batch)) &&
            (!FILTERS.process.length || FILTERS.process.includes(d.process)) &&
            (!FILTERS.trainer.length || FILTERS.trainer.includes(d.trainer)) &&
            (!FILTERS.type.length || FILTERS.type.includes(d.type)) &&
            (!FILTERS.month.length || FILTERS.month.includes(d.month))
        );

        const s = data.reduce((a, c) => {
            a.t += c.target; a.h += c.hc; a.a += c.at; a.v += c.cv; a.c += c.cert; a.d += c.days; return a;
        }, { t:0, h:0, a:0, v:0, c:0, d:0 });

        // Update Headers
        document.getElementById('h-sum-text').innerHTML = `Batch 127 → 286 · Jan 2024 - Mar 2026 · 6 Trainers · 41 Processes`;
        document.getElementById('h-count').innerText = data.length;
        document.getElementById('h-hc').innerText = Math.round(s.h);
        document.getElementById('h-at').innerText = Math.round(s.a);
        document.getElementById('h-conv').innerText = (s.v / (data.length || 1)).toFixed(1) + "%";

        // Update Status Bar
        document.getElementById('status-text').innerText = data.length === RAW.length ? "Showing all records" : `Filtering ${data.length} records`;
        document.getElementById('status-count').innerHTML = `<span>${data.length}</span> / <span>${RAW.length}</span> batches`;

        // Update KPIs
        document.getElementById('k-target').innerText = Math.round(s.t);
        document.getElementById('k-hc').innerText = Math.round(s.h);
        document.getElementById('k-at').innerText = Math.round(s.a);
        document.getElementById('k-cv').innerText = (s.v / (data.length || 1)).toFixed(1) + "%";
        document.getElementById('k-cert').innerText = (s.c / (data.length || 1)).toFixed(1) + "%";
        document.getElementById('k-days').innerText = Math.round(s.d);
    }

    loadData();
</script>
</body>
</html>
