<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>OJT Training Dashboard - Final Version</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
        
        :root {
            --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
            --border: #334155; --text: #f8fafc; --text2: #cbd5e1; 
            --accent: #38bdf8; --red: #f43f5e; --green: #10b981;
            --r: 12px; --rs: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .header { background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .hstats { display: flex; gap: 20px; }
        .hstat { text-align: center; background: var(--surface); padding: 5px 15px; border-radius: var(--rs); border: 1px solid var(--border); }
        .hstat .v { font-size: 18px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
        .hstat .l { font-size: 8px; color: var(--text2); text-transform: uppercase; }

        .slicer-bar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .dd-wrap { position: relative; display: flex; flex-direction: column; gap: 4px; }
        .dd-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; margin-left: 2px; }
        
        .dd-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--rs); padding: 8px 12px; font-size: 11px; cursor: pointer; min-width: 140px; display: flex; justify-content: space-between; align-items: center; }
        .arrow { font-size: 10px; transition: transform 0.3s; }
        .open .arrow { transform: rotate(180deg); }

        .dd-panel { position: absolute; top: calc(100% + 5px); left: 0; width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); z-index: 1100; display: none; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .dd-panel.show { display: flex; }
        .dd-search-area { padding: 8px; border-bottom: 1px solid var(--border); }
        .dd-search-area input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px; border-radius: 6px; font-size: 12px; outline: none; }
        .dd-controls { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; font-size: 10px; font-weight: 600; }
        .act-sel { color: var(--accent); cursor: pointer; }
        .act-clr { color: var(--red); cursor: pointer; }
        .dd-list { max-height: 200px; overflow-y: auto; padding: 5px 0; }
        .dd-item { padding: 8px 12px; display: flex; align-items: center; gap: 10px; font-size: 12px; cursor: pointer; }
        .dd-item:hover { background: var(--surface2); }
        .dd-item input { accent-color: var(--accent); cursor: pointer; }

        .btn-reset { background: var(--surface2); color: var(--text); border: none; padding: 8px 15px; border-radius: var(--rs); cursor: pointer; font-size: 11px; margin-left: auto; }

        .main { padding: 24px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
        .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; border-top: 4px solid var(--accent); transition: 0.3s; }
        .kpi-card.red { border-top-color: var(--red); }
        .kpi-card.green { border-top-color: var(--green); }
        .kpi-card .lbl { font-size: 10px; color: var(--text2); text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
        .kpi-card .val { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="l-msg">Fetching Live Sheet Data...</p>
</div>

<div class="header">
    <div><h1>OJT Training Dashboard</h1><p style="color:var(--accent); font-size:10px;">Live Data Feed</p></div>
    <div class="hstats">
        <div class="hstat"><div class="v" id="hBatches">0</div><div class="l">Batches</div></div>
        <div class="hstat"><div class="v" id="hHC">0</div><div class="l">Headcount</div></div>
        <div class="hstat"><div class="v" id="hAttr">0</div><div class="l">Attrition</div></div>
    </div>
</div>

<div class="slicer-bar">
    <div class="dd-wrap" id="wrap-batch">
        <div class="dd-label">Batch</div>
        <button class="dd-btn" onclick="toggleDD('batch')"><span id="lbl-batch">All</span> <span class="arrow">▼</span></button>
        <div id="panel-batch" class="dd-panel"><div class="dd-search-area"><input type="text" onkeyup="searchDD('batch', this.value)"></div><div class="dd-controls"><span class="act-sel" onclick="bulk('batch', true)">All</span><span class="act-clr" onclick="bulk('batch', false)">Clear</span></div><div class="dd-list" id="list-batch"></div></div>
    </div>

    <div class="dd-wrap" id="wrap-process">
        <div class="dd-label">Process</div>
        <button class="dd-btn" onclick="toggleDD('process')"><span id="lbl-process">All</span> <span class="arrow">▼</span></button>
        <div id="panel-process" class="dd-panel"><div class="dd-search-area"><input type="text" onkeyup="searchDD('process', this.value)"></div><div class="dd-controls"><span class="act-sel" onclick="bulk('process', true)">All</span><span class="act-clr" onclick="bulk('process', false)">Clear</span></div><div class="dd-list" id="list-process"></div></div>
    </div>

    <div class="dd-wrap" id="wrap-type">
        <div class="dd-label">Batch Type</div>
        <button class="dd-btn" onclick="toggleDD('type')"><span id="lbl-type">All</span> <span class="arrow">▼</span></button>
        <div id="panel-type" class="dd-panel"><div class="dd-search-area"><input type="text" onkeyup="searchDD('type', this.value)"></div><div class="dd-controls"><span class="act-sel" onclick="bulk('type', true)">All</span><span class="act-clr" onclick="bulk('type', false)">Clear</span></div><div class="dd-list" id="list-type"></div></div>
    </div>

    <div class="dd-wrap" id="wrap-trainer">
        <div class="dd-label">Trainer</div>
        <button class="dd-btn" onclick="toggleDD('trainer')"><span id="lbl-trainer">All</span> <span class="arrow">▼</span></button>
        <div id="panel-trainer" class="dd-panel"><div class="dd-search-area"><input type="text" onkeyup="searchDD('trainer', this.value)"></div><div class="dd-controls"><span class="act-sel" onclick="bulk('trainer', true)">All</span><span class="act-clr" onclick="bulk('trainer', false)">Clear</span></div><div class="dd-list" id="list-trainer"></div></div>
    </div>

    <div class="dd-wrap" id="wrap-month">
        <div class="dd-label">Month</div>
        <button class="dd-btn" onclick="toggleDD('month')"><span id="lbl-month">All</span> <span class="arrow">▼</span></button>
        <div id="panel-month" class="dd-panel"><div class="dd-search-area"><input type="text" onkeyup="searchDD('month', this.value)"></div><div class="dd-controls"><span class="act-sel" onclick="bulk('month', true)">All</span><span class="act-clr" onclick="bulk('month', false)">Clear</span></div><div class="dd-list" id="list-month"></div></div>
    </div>

    <button class="btn-reset" onclick="resetAll()">↺ Reset All</button>
</div>

<div class="main">
    <div class="kpi-grid">
        <div class="kpi-card"><div class="lbl">Total Batches</div><div class="val" id="k-batches">0</div></div>
        <div class="kpi-card"><div class="lbl">Total Headcount</div><div class="val" id="k-hc">0</div></div>
        <div class="kpi-card red"><div class="lbl">Total Attrition</div><div class="val" id="k-attr">0</div></div>
        <div class="kpi-card green"><div class="lbl">Avg Conv %</div><div class="val" id="k-conv">0%</div></div>
    </div>
</div>

<script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    const monthOrder = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    
    let RAW = [];
    let filters = { batch: [], process: [], type: [], trainer: [], month: [] };

    async function init() {
        try {
            const res = await fetch(sheetURL);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(','));
            
            RAW = rows.slice(1).map(c => ({
                batch: c[0]?.trim() || "",
                process: c[1]?.trim() || "",
                trainer: c[2]?.trim() || "",
                type: c[4]?.trim() || "",
                month: c[5]?.trim() || "",
                hc: parseFloat(c[8]) || 0,
                attr: parseFloat(c[10]) || 0,
                conv: parseFloat(c[19]) || 0
            })).filter(d => d.batch && !d.batch.toLowerCase().includes("batch"));

            document.getElementById('loader').style.display = 'none';
            renderAllFilters();
            update();
        } catch (e) { document.getElementById('l-msg').innerText = "Link Error: Check CSV Publishing."; }
    }

    // Fixed Chronological Month Logic
    function sortMonthsChronologically(arr) {
        return arr.sort((a, b) => {
            const partsA = a.split("'");
            const partsB = b.split("'");
            const yrA = parseInt(partsA[1]);
            const yrB = parseInt(partsB[1]);
            if (yrA !== yrB) return yrA - yrB;
            return monthOrder.indexOf(partsA[0]) - monthOrder.indexOf(partsB[0]);
        });
    }

    function renderAllFilters(targetKey = '', searchVal = '') {
        const keys = ['batch', 'process', 'type', 'trainer', 'month'];
        keys.forEach(k => {
            if (targetKey && targetKey !== k) return;
            let vals = [...new Set(RAW.map(d => d[k]))].filter(v => v && v.toLowerCase().includes(searchVal.toLowerCase()));
            
            if (k === 'month') vals = sortMonthsChronologically(vals);
            else vals.sort();

            document.getElementById('list-' + k).innerHTML = vals.map(v => `
                <div class="dd-item" onclick="toggleItem('${k}', '${v}')">
                    <input type="checkbox" ${filters[k].includes(v) ? 'checked' : ''} onclick="event.stopPropagation(); toggleItem('${k}', '${v}')">
                    <span>${v}</span>
                </div>
            `).join('');
        });
    }

    function toggleDD(key) {
        const wrap = document.getElementById('wrap-' + key);
        const panel = document.getElementById('panel-' + key);
        const wasOpen = wrap.classList.contains('open');
        document.querySelectorAll('.dd-wrap').forEach(w => w.classList.remove('open'));
        document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('show'));
        if (!wasOpen) { wrap.classList.add('open'); panel.classList.add('show'); }
    }

    function toggleItem(k, v) {
        const i = filters[k].indexOf(v);
        if (i > -1) filters[k].splice(i, 1); else filters[k].push(v);
        document.getElementById('lbl-' + k).innerText = filters[k].length ? filters[k].length + ' Selected' : 'All';
        renderAllFilters(k); update();
    }

    function update() {
        const f = RAW.filter(d => 
            (!filters.batch.length || filters.batch.includes(d.batch)) &&
            (!filters.process.length || filters.process.includes(d.process)) &&
            (!filters.type.length || filters.type.includes(d.type)) &&
            (!filters.trainer.length || filters.trainer.includes(d.trainer)) &&
            (!filters.month.length || filters.month.includes(d.month))
        );

        const hc = f.reduce((a, b) => a + b.hc, 0);
        const at = f.reduce((a, b) => a + b.attr, 0);
        const avgConv = f.length ? (f.reduce((a, b) => a + (b.conv > 1.5 ? b.conv/100 : b.conv), 0) / f.length * 100).toFixed(1) : 0;

        document.getElementById('hBatches').innerText = f.length;
        document.getElementById('k-batches').innerText = f.length;
        document.getElementById('hHC').innerText = Math.round(hc);
        document.getElementById('k-hc').innerText = Math.round(hc);
        document.getElementById('hAttr').innerText = Math.round(at);
        document.getElementById('k-attr').innerText = Math.round(at);
        document.getElementById('k-conv').innerText = avgConv + '%';
    }

    function searchDD(k, v) { renderAllFilters(k, v); }
    function bulk(k, sel) {
        filters[k] = sel ? [...new Set(RAW.map(d => d[k]))] : [];
        document.getElementById('lbl-' + k).innerText = filters[k].length ? 'All' : 'All';
        renderAllFilters(k); update();
    }
    function resetAll() { location.reload(); }

    window.onclick = (e) => { if (!e.target.closest('.dd-wrap')) {
        document.querySelectorAll('.dd-wrap').forEach(w => w.classList.remove('open'));
        document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('show'));
    }};

    init();
</script>
</body>
</html>
