<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>OJT Dashboard - Fixed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
        :root {
            --bg: #f4f7fa; --surface: #ffffff; --surface3: #f1f3f9;
            --border: #dbe2ef; --border2: #cfd9e8; --text: #1a202c; 
            --text2: #4a5568; --text3: #718096; --accent: #3182ce;
            --red: #e53e3e; --green: #38a169; --r: 12px; --rs: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
        .slicer-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 10px; align-items: center; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 24px; }
        .kpi-card { background: #fff; border: 1px solid var(--border); border-radius: var(--r); padding: 20px; border-top: 4px solid var(--accent); }
        .val { font-size: 28px; font-weight: 700; font-family: 'DM Mono'; }
        .lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="l-msg">Fetching Live Sheet Data...</p>
</div>

<div class="header">
    <h1>OJT Training Dashboard</h1>
    <div style="display:flex; gap:20px;">
        <div id="hBatches"><b>0</b> Batches</div>
        <div id="hHC"><b>0</b> Headcount</div>
    </div>
</div>

<div class="slicer-bar">
    <span>Filter Data:</span>
    <button onclick="resetAll()" style="padding: 5px 10px; cursor: pointer;">Reset All</button>
</div>

<div class="kpi-grid">
    <div class="kpi-card"><div class="lbl">Batches</div><div class="val" id="k-batches">0</div></div>
    <div class="kpi-card"><div class="lbl">Headcount</div><div class="val" id="k-hc">0</div></div>
    <div class="kpi-card" style="border-top-color: var(--red)"><div class="lbl">Attrition</div><div class="val" id="k-attr">0</div></div>
    <div class="kpi-card" style="border-top-color: var(--green)"><div class="lbl">Conversion</div><div class="val" id="k-conv">0%</div></div>
</div>

<script>
    // THE LINK YOU PROVIDED
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";

    let RAW = [];

    async function init() {
        const loaderMsg = document.getElementById('l-msg');
        try {
            console.log("Attempting to fetch data...");
            const res = await fetch(sheetURL);
            
            if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
            
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(','));
            
            // Map the data - Adjusting column indices based on standard layout
            RAW = rows.slice(1).map(c => ({
                batch: c[0]?.trim(),
                hc: parseFloat(c[8]) || 0,
                attr: parseFloat(c[10]) || 0,
                conv: parseFloat(c[19]) || 0
            })).filter(d => d.batch && d.batch !== "");

            if (RAW.length === 0) throw new Error("Sheet loaded but no data found.");

            document.getElementById('loader').style.display = 'none';
            update();
        } catch (e) {
            console.error("Dashboard Error:", e);
            loaderMsg.innerHTML = `<b style="color:red">Failed to Load Data</b><br>${e.message}<br><br>Check if 'Publish to Web' is still active.`;
        }
    }

    function update() {
        const hc = RAW.reduce((a, b) => a + b.hc, 0);
        const attr = RAW.reduce((a, b) => a + b.attr, 0);
        const avgConv = RAW.length ? (RAW.reduce((a, b) => a + (b.conv > 1 ? b.conv/100 : b.conv), 0) / RAW.length * 100).toFixed(1) : 0;

        document.getElementById('k-batches').innerText = RAW.length;
        document.getElementById('k-hc').innerText = Math.round(hc);
        document.getElementById('k-attr').innerText = Math.round(attr);
        document.getElementById('k-conv').innerText = avgConv + "%";
    }

    function resetAll() { location.reload(); }

    init();
</script>
</body>
</html>
