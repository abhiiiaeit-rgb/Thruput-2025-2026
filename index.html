<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>OJT Training Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
        :root {
            --bg:#0c0f1a; --surface:#141824; --surface2:#1c2235; --surface3:#232b42;
            --border:#2a3450; --border2:#3a4a6a; --text:#e8edf5; --text2:#8a9bc4;
            --text3:#5a6a8a; --accent:#4f8ef7; --red:#f05a5a; --r:12px; --rs:8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        /* Fixed Loader */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .header { background: linear-gradient(135deg,#0d1530 0%,#1a2550 50%,#0d1530 100%); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
        .hstat .v { font-size: 20px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
        .hstat .l { font-size: 9px; color: var(--text3); text-transform: uppercase; }

        .slicer-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 14px; position: sticky; top: 57px; z-index: 150; }
        .dd-wrap { position: relative; display: flex; flex-direction: column; gap: 4px; }
        .dd-wrap label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
        .dd-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: var(--rs); padding: 8px 12px; font-size: 12px; cursor: pointer; min-width: 170px; display: flex; justify-content: space-between; }
        
        .dd-panel { position: absolute; top: 100%; left: 0; min-width: 240px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); z-index: 300; display: none; flex-direction: column; margin-top: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dd-panel.open { display: flex; }
        .dd-search { padding: 10px; border-bottom: 1px solid var(--border); }
        .dd-search input { width: 100%; background: var(--surface3); border: 1px solid var(--border); color: #fff; padding: 6px; border-radius: 4px; font-size: 12px; }
        .dd-controls { padding: 8px 15px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; font-size: 11px; font-weight: 600; color: var(--accent); cursor: pointer; }
        .dd-list { max-height: 200px; overflow-y: auto; padding: 5px 0; }
        .dd-item { padding: 8px 15px; display: flex; align-items: center; gap: 10px; font-size: 12px; cursor: pointer; }
        .dd-item:hover { background: var(--surface3); }
        .dd-item input { accent-color: var(--accent); }

        .main { padding: 24px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; border-top: 3px solid var(--accent); }
        .kpi-card .lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
        .kpi-card .val { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; }
        
        .btn-reset { background: var(--surface3); color: var(--text2); border: 1px solid var(--border2); padding: 8px 15px; border-radius: var(--rs); cursor: pointer; font-size: 12px; align-self: flex-end; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-status">Connecting to Live Sheet...</p>
</div>

<div class="header">
    <div><h1>OJT Training Dashboard</h1><p style="color:var(--text3); font-size:10px;">Stability Fix Applied</p></div>
    <div style="display:flex; gap:20px;">
        <div class="hstat"><div class="v" id="hTotal">0</div><div class="l">Batches</div></div>
        <div class="hstat"><div class="v" id="hHC">0</div><div class="l">Headcount</div></div>
    </div>
</div>

<div class="slicer-bar">
    <div class="dd-wrap"><label>Batch</label><button class="dd-btn" onclick="toggleDD('dd-batch')"><span id="lbl-batch">All</span> ▾</button>
        <div id="dd-batch" class="dd-panel">
            <div class="dd-search"><input type="text" placeholder="Search..." onkeyup="searchFilter('batch', this.value)"></div>
            <div class="dd-controls"><span onclick="bulk('batch', true)">Select All</span><span onclick="bulk('batch', false)" style="color:var(--red)">Clear</span></div>
            <div class="dd-list" id="list-batch"></div>
        </div>
    </div>

    <div class="dd-wrap"><label>Process</label><button class="dd-btn" onclick="toggleDD('dd-process')"><span id="lbl-process">All</span> ▾</button>
        <div id="dd-process" class="dd-panel">
            <div class="dd-search"><input type="text" placeholder="Search..." onkeyup="searchFilter('process', this.value)"></div>
            <div class="dd-controls"><span onclick="bulk('process', true)">Select All</span><span onclick="bulk('process', false)" style="color:var(--red)">Clear</span></div>
            <div class="dd-list" id="list-process"></div>
        </div>
    </div>

    <button class="btn-reset" onclick="location.reload()">↺ Force Refresh</button>
</div>

<div class="main">
    <div class="kpi-grid">
        <div class="kpi-card"><div class="lbl">Total Batches</div><div class="val" id="k-batches">0</div></div>
        <div class="kpi-card"><div class="lbl">Total Headcount</div><div class="val" id="k-hc">0</div></div>
        <div class="kpi-card"><div class="lbl">Avg Conversion</div><div class="val" id="k-conv">0%</div></div>
    </div>
</div>

<script>
    // FIX: Using a CORS proxy to ensure the link opens correctly
    const rawURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    const proxyURL = "https://api.allorigins.win/raw?url=" + encodeURIComponent(rawURL);
    
    let RAW_DATA = [];
    let filters = { batch: [], process: [] };

    async function init() {
        try {
            // Try fetching with proxy first for stability
            const res = await fetch(proxyURL);
            const text = await res.text();
            parse(text);
        } catch (e) {
            console.error("Connection failed, using local cache check...");
            document.getElementById('loader-status').innerText = "Link error. Please check Google Sheet publishing.";
        }
    }

    function parse(text) {
        const rows = text.split('\n').map(r => r.split(','));
        RAW_DATA = rows.slice(1).map(c => ({
            batch: c[0]?.trim() || "", 
            process: c[1]?.trim() || "",
            hc: parseFloat(c[8]) || 0, 
            conv: parseFloat(c[19]) || 0
        })).filter(d => d.batch && d.batch !== "Batch");

        document.getElementById('loader').style.display = 'none';
        renderFilters();
        update();
    }

    function renderFilters(key = '', search = '') {
        const setup = (fKey, field, listId) => {
            if(key && key !== fKey) return;
            const items = [...new Set(RAW_DATA.map(d => d[field]))].filter(v => v.toLowerCase().includes(search.toLowerCase())).sort();
            document.getElementById(listId).innerHTML = items.map(v => `
                <div class="dd-item" onclick="toggleFilter('${fKey}', '${v}')">
                    <input type="checkbox" ${filters[fKey].includes(v) ? 'checked' : ''}>
                    <span>${v}</span>
                </div>
            `).join('');
        };
        setup('batch', 'batch', 'list-batch');
        setup('process', 'process', 'list-process');
    }

    function toggleFilter(key, val) {
        const idx = filters[key].indexOf(val);
        if(idx > -1) filters[key].splice(idx, 1); else filters[key].push(val);
        document.getElementById('lbl-' + key).innerText = filters[key].length ? filters[key].length + ' Selected' : 'All';
        update();
    }

    function searchFilter(key, val) { renderFilters(key, val); }

    function bulk(key, sel) {
        filters[key] = sel ? [...new Set(RAW_DATA.map(d => d[key === 'batch' ? 'batch' : 'process']))] : [];
        document.getElementById('lbl-' + key).innerText = sel ? 'All Selected' : 'All';
        renderFilters(key);
        update();
    }

    function update() {
        const filtered = RAW_DATA.filter(d => 
            (!filters.batch.length || filters.batch.includes(d.batch)) &&
            (!filters.process.length || filters.process.includes(d.process))
        );
        const hc = Math.round(filtered.reduce((a, b) => a + b.hc, 0));
        const cv = filtered.length ? (filtered.reduce((a, b) => a + b.conv, 0) / filtered.length * 100).toFixed(1) : 0;
        
        document.getElementById('hTotal').innerText = filtered.length;
        document.getElementById('k-batches').innerText = filtered.length;
        document.getElementById('hHC').innerText = hc;
        document.getElementById('k-hc').innerText = hc;
        document.getElementById('k-conv').innerText = cv + '%';
    }

    function toggleDD(id) {
        const el = document.getElementById(id);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('open'));
        if(!isOpen) el.classList.add('open');
    }

    window.onclick = e => { if(!e.target.closest('.dd-wrap')) document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('open')); };
    init();
</script>
</body>
</html>
