<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Operational Analytics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap');
        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950; --dropdown-bg: #1c2128;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        .header { 
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); background: var(--bg);
        }
        .h-left h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .h-summary { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-dim); }
        .h-summary span { color: var(--accent); }

        .h-right { display: flex; gap: 30px; }
        .hk-item { text-align: center; }
        .hk-v { display: block; font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono'; color: var(--accent); }
        .hk-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        /* SLICER NAV */
        .nav-bar { display: flex; gap: 15px; padding: 15px 30px; background: #090c10; border-bottom: 1px solid var(--border); align-items: flex-end; }
        .dropdown { position: relative; width: 180px; }
        .dd-label { font-size: 10px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        
        .dd-btn { 
            width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); 
            color: var(--text); border-radius: 6px; cursor: pointer; text-align: left; font-size: 12px; 
            display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
        }
        .dd-btn:hover { border-color: var(--accent); }
        .count-badge { background: var(--accent); color: #000; font-size: 9px; font-weight: 900; padding: 1px 6px; border-radius: 10px; margin-left: auto; margin-right: 8px; }
        
        /* SEARCHABLE MENU */
        .dd-menu { 
            position: absolute; top: 110%; left: 0; width: 240px; background: var(--dropdown-bg); 
            border: 1px solid var(--border); border-radius: 8px; display: none; z-index: 1001; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); overflow: hidden;
        }
        .dropdown.open .dd-menu { display: block; }
        
        .search-container { padding: 10px; border-bottom: 1px solid var(--border); }
        .search-input { 
            width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid var(--border); 
            color: var(--text); border-radius: 4px; font-size: 11px; outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        .dd-actions { display: flex; gap: 15px; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; }
        .act-link { color: var(--accent); cursor: pointer; font-weight: 600; }
        .act-link.clear { color: var(--red); }

        .dd-list { max-height: 250px; overflow-y: auto; padding: 5px 0; }
        .li { 
            padding: 8px 15px; display: flex; align-items: center; gap: 12px; 
            font-size: 12px; cursor: pointer; transition: 0.1s;
        }
        .li:hover { background: rgba(255,255,255,0.05); }
        .li.active { color: #fff; font-weight: 600; }
        
        .custom-chk { 
            width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 3px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .li.active .custom-chk { background: var(--accent); border-color: var(--accent); }
        .li.active .custom-chk::after { content: '✓'; color: #000; font-size: 11px; font-weight: 900; }

        /* CARDS */
        .section-drop { padding: 30px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 12px; border-left: 4px solid var(--accent); }
        .c-l { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 10px; display: block; letter-spacing: 0.5px; }
        .c-v { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono'; color: #fff; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 30px; height: 30px; border: 3px solid #30363d; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div class="header">
    <div class="h-left">
        <h1>OJT Operational Analytics</h1>
        <div class="h-summary" id="h-sum-text">Initializing...</div>
    </div>
    <div class="h-right">
        <div class="hk-item"><span class="hk-v" id="h-count">0</span><span class="hk-l">Total Batches</span></div>
        <div class="hk-item"><span class="hk-v" id="h-hc">0</span><span class="hk-l">Total HC</span></div>
        <div class="hk-item"><span class="hk-v" id="h-at" style="color:var(--red)">0</span><span class="hk-l">Total Attrition</span></div>
        <div class="hk-item"><span class="hk-v" id="h-conv" style="color:var(--green)">0%</span><span class="hk-l">Avg Conv%</span></div>
    </div>
</div>

<div class="nav-bar">
    <div class="dropdown" id="dd-process"><div class="dd-label">🏭 Process</div><button class="dd-btn" onclick="toggleDD('dd-process')">All <span>▼</span></button>
        <div class="dd-menu">
            <div class="search-container"><input type="text" class="search-input" placeholder="Search..." onkeyup="filterList('process', this.value)"></div>
            <div class="dd-actions"><span class="act-link" onclick="bulk('process',1)">Select All</span><span class="act-link clear" onclick="bulk('process',0)">Clear</span></div>
            <div class="dd-list" id="list-process"></div>
        </div>
    </div>

    <div class="dropdown" id="dd-type"><div class="dd-label">⚡ Type</div><button class="dd-btn" onclick="toggleDD('dd-type')">All <span>▼</span></button>
        <div class="dd-menu">
            <div class="search-container"><input type="text" class="search-input" placeholder="Search..." onkeyup="filterList('type', this.value)"></div>
            <div class="dd-actions"><span class="act-link" onclick="bulk('type',1)">Select All</span><span class="act-link clear" onclick="bulk('type',0)">Clear</span></div>
            <div class="dd-list" id="list-type"></div>
        </div>
    </div>

    <div class="dropdown" id="dd-trainer"><div class="dd-label">👤 Trainer</div><button class="dd-btn" onclick="toggleDD('dd-trainer')">All <span>▼</span></button>
        <div class="dd-menu">
            <div class="search-container"><input type="text" class="search-input" placeholder="Search..." onkeyup="filterList('trainer', this.value)"></div>
            <div class="dd-actions"><span class="act-link" onclick="bulk('trainer',1)">Select All</span><span class="act-link clear" onclick="bulk('trainer',0)">Clear</span></div>
            <div class="dd-list" id="list-trainer"></div>
        </div>
    </div>

    <div class="dropdown" id="dd-month"><div class="dd-label">📅 Month</div><button class="dd-btn" id="btn-month" onclick="toggleDD('dd-month')">All <span>▼</span></button>
        <div class="dd-menu">
            <div class="search-container"><input type="text" class="search-input" placeholder="Search..." onkeyup="filterList('month', this.value)"></div>
            <div class="dd-actions"><span class="act-link" onclick="bulk('month',1)">Select All</span><span class="act-link clear" onclick="bulk('month',0)">Clear</span></div>
            <div class="dd-list" id="list-month"></div>
        </div>
    </div>

    <button onclick="loadData(true)" style="padding:10px 20px; background:transparent; border:1px solid var(--accent); color:var(--accent); border-radius:6px; font-size:11px; font-weight:800; cursor:pointer; margin-left:auto;">⚡ LIVE REFRESH</button>
    <button onclick="location.reload()" style="padding:10px 20px; background:var(--red); border:none; color:#fff; border-radius:6px; font-size:11px; font-weight:800; cursor:pointer;">× RESET ALL</button>
</div>

<div class="section-drop">
    <div class="kpi-grid">
        <div class="card"><span class="c-l">Target HC</span><div class="c-v" id="k-target">0</div></div>
        <div class="card"><span class="c-l">Actual HC</span><div class="c-v" id="k-hc">0</div></div>
        <div class="card" style="border-left-color:var(--red)"><span class="c-l">Attrition Count</span><div class="c-v" id="k-at">0</div></div>
        <div class="card" style="border-left-color:var(--green)"><span class="c-l">Conversion %</span><div class="c-v" id="k-cv">0%</div></div>
        <div class="card"><span class="c-l">Certification %</span><div class="c-v" id="k-cert">0%</div></div>
        <div class="card"><span class="c-l">Training Days</span><div class="c-v" id="k-days">0</div></div>
    </div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    let RAW = [], FILTERS = { process: [], type: [], trainer: [], month: [] };
    const monthOrder = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    window.onclick = (e) => { if (!e.target.closest('.dropdown')) document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open')); }
    
    function toggleDD(id) {
        const el = document.getElementById(id);
        const isO = el.classList.contains('open');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        if(!isO) el.classList.add('open');
    }

    async function loadData(ref = false) {
        if(ref) document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(`${URL}&cb=${Date.now()}`);
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(','));
            
            RAW = rows.slice(3).map(c => ({
                batch: c[0] || "", process: c[1] || "", trainer: c[2] || "",
                type: c[4] || "", month: c[5] || "", 
                target: parseFloat(c[6]) || 0, hc: parseFloat(c[7]) || 0, 
                at: parseFloat(c[8]) || 0, cert: parseFloat(c[9]) || 0,
                cv: parseFloat(c[10]) || 0, days: parseFloat(c[11]) || 0
            })).filter(d => d.month);

            renderSlicers(); update();
        } catch (e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderSlicers() {
        ['process', 'type', 'trainer', 'month'].forEach(key => {
            let items = [...new Set(RAW.map(d => d[key]))].filter(v => v !== "");
            if(key === 'month') items.sort((a,b) => {
                const [m1, y1] = a.split("'"), [m2, y2] = b.split("'");
                return y1 !== y2 ? y1 - y2 : monthOrder.indexOf(m1) - monthOrder.indexOf(m2);
            });
            else items.sort();

            const listEl = document.getElementById('list-' + key);
            listEl.innerHTML = items.map(v => `
                <div class="li ${FILTERS[key].includes(v)?'active':''}" data-val="${v.toLowerCase()}" onclick="toggleItem('${key}','${v}')">
                    <div class="custom-chk"></div><span>${v}</span>
                </div>`).join('');
            
            // Update Button Text
            const btn = document.querySelector(`#dd-${key} .dd-btn`);
            const selCount = FILTERS[key].length;
            if (selCount === 0) btn.innerHTML = `All <span>▼</span>`;
            else if (selCount === 1) btn.innerHTML = `${FILTERS[key][0]} <span>▼</span>`;
            else btn.innerHTML = `${selCount} Selected <span class="count-badge">${selCount}</span> <span>▲</span>`;
        });
    }

    function toggleItem(k, v) {
        const i = FILTERS[k].indexOf(v);
        if(i > -1) FILTERS[k].splice(i, 1); else FILTERS[k].push(v);
        update(); renderSlicers();
    }

    function bulk(k, all) {
        FILTERS[k] = all ? [...new Set(RAW.map(d => d[k]))].filter(v => v !== "") : [];
        update(); renderSlicers();
    }

    function filterList(key, query) {
        const items = document.querySelectorAll(`#list-${key} .li`);
        items.forEach(el => {
            el.style.display = el.getAttribute('data-val').includes(query.toLowerCase()) ? 'flex' : 'none';
        });
    }

    function update() {
        const data = RAW.filter(d => 
            (!FILTERS.process.length || FILTERS.process.includes(d.process)) &&
            (!FILTERS.type.length || FILTERS.type.includes(d.type)) &&
            (!FILTERS.trainer.length || FILTERS.trainer.includes(d.trainer)) &&
            (!FILTERS.month.length || FILTERS.month.includes(d.month))
        );

        const sum = data.reduce((a, c) => {
            a.t += c.target; a.h += c.hc; a.a += c.at; a.v += c.cv; a.c += c.cert; a.d += c.days; return a;
        }, { t:0, h:0, a:0, v:0, c:0, d:0 });

        const count = data.length || 1;

        // Header Range Fix
        const months = FILTERS.month.length ? [...FILTERS.month] : [...new Set(data.map(d => d.month))];
        months.sort((a,b) => {
            const [m1, y1] = a.split("'"), [m2, y2] = b.split("'");
            return y1 !== y2 ? y1 - y2 : monthOrder.indexOf(m1) - monthOrder.indexOf(m2);
        });
        const mRange = months.length > 1 ? `${months[0]} – ${months[months.length-1]}` : (months[0] || "Jan'24");

        document.getElementById('h-sum-text').innerHTML = `Range: <span>${mRange}</span> · <span>${[...new Set(data.map(d => d.trainer))].length} Trainers</span>`;
        document.getElementById('h-count').innerText = data.length;
        document.getElementById('h-hc').innerText = Math.round(sum.h).toLocaleString();
        document.getElementById('h-at').innerText = Math.round(sum.a).toLocaleString();
        document.getElementById('h-conv').innerText = (sum.v / count).toFixed(1) + "%";

        document.getElementById('k-target').innerText = Math.round(sum.t).toLocaleString();
        document.getElementById('k-hc').innerText = Math.round(sum.h).toLocaleString();
        document.getElementById('k-at').innerText = Math.round(sum.a).toLocaleString();
        document.getElementById('k-cv').innerText = (sum.v / count).toFixed(1) + "%";
        document.getElementById('k-cert').innerText = (sum.c / count).toFixed(1) + "%";
        document.getElementById('k-days').innerText = Math.round(sum.d).toLocaleString();
    }

    loadData();
</script>
</body>
</html>
