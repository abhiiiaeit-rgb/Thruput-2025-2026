<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Performance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg px-4 shadow-sm bg-white">
        <span class="navbar-brand fw-bold text-primary">Thruput Dashboard 2025-26</span>
        <div class="ms-auto d-flex gap-3">
            <select id="batchFilter" class="form-select form-select-sm"><option value="All">All Batches</option></select>
            <select id="trainerFilter" class="form-select form-select-sm"><option value="All">All Trainers</option></select>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="card stat-card"><div class="label">TOTAL BATCHES</div><div class="value" id="stat-batches">0</div></div></div>
            <div class="col-md-3"><div class="card stat-card"><div class="label">HEADCOUNT</div><div class="value" id="stat-hc">0</div></div></div>
            <div class="col-md-3"><div class="card stat-card"><div class="label">ATTRITION %</div><div class="value text-danger" id="stat-attr">0%</div></div></div>
            <div class="col-md-3"><div class="card stat-card"><div class="label">AVG CONV %</div><div class="value text-success" id="stat-conv">0%</div></div></div>
        </div>

        <div class="row g-4">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm h-100">
                    <h6 class="fw-bold mb-3">MONTHLY HEADCOUNT TREND</h6>
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 shadow-sm h-100">
                    <h6 class="fw-bold mb-3">PKT ATTEMPT DISTRIBUTION</h6>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
