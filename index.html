<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Hire Thruput Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* HEADER LAYOUT */
        .header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .h-left { display: flex; align-items: center; gap: 30px; }
        .brand { border-right: 1px solid var(--border); padding-right: 25px; line-height: 1.1; }
        .brand h1 { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .brand p { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        
        .h-stats { display: flex; gap: 25px; align-items: center; }
        .hs-item { text-align: left; }
        .hs-v { display: block; font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono'; }
        .hs-l { font-size: 8px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        
        .h-bread { text-align: right; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); line-height: 1.4; }
        .h-bread span { color: var(--accent); }

        /* NAVIGATION & DROPDOWNS */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background: #090c10; border-bottom: 1px solid var(--border); }
        .filter-group { display: flex; gap: 8px; }
        .dropdown { position: relative; width: 140px; }
        .dd-btn { width: 100%; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; text-align: left; font-size: 11px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .dd-menu { position: absolute; top: 115%; left: 0; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; max-height: 250px; overflow-y: auto; display: none; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown.open .dd-menu { display: block; }
        .li { padding: 9px 12px; display: flex; align-items: center; gap: 10px; font-size: 11px; cursor: pointer; color: var(--text-dim); border-bottom: 1px solid rgba(255,255,255,0.03); }
        .li:hover { background: #21262d; color: #fff; }
        .li.active { color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        .chk { width: 13px; height: 13px; border: 1px solid var(--border); border-radius: 2px; flex-shrink: 0; }
        .li.active .chk { background: var(--accent); border-color: var(--accent); }

        /* KPI CARDS */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; padding: 20px 30px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); position: relative; overflow: hidden; }
        .c-l { font-size: 8px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
        .c-v { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono'; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 25px; height: 25px; border: 2px solid #30363d; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="font-size:10px; color:var(--text-dim); margin-top:12px; letter-spacing:1px">SYNCING LIVE THRUPUT...</p></div>

<div class="header">
    <div class="h-left">
        <div class="brand">
            <h1>New Hire</h1>
            <p>Thruput Live</p>
        </div>
        <div class="h-stats">
            <div class="hs-item"><span class="hs-v" id="h-batches">0</span><span class="hs-l">Batches</span></div>
            <div class="hs-item"><span class="hs-v" id="h-hc" style="color:var(--accent)">0</span><span class="hs-l">Headcount</span></div>
            <div class="hs-item"><span class="hs-v" id="h-at" style="color:var(--red)">0</span><span class="hs-l">Attrition</span></div>
            <div class="hs-item"><span class="hs-v" id="h-conv" style="color:var(--green)">0%</span><span class="hs-l">Avg Conv%</span></div>
        </div>
    </div>
    <div class="h-bread" id="h-bread-text">Connecting to OJT Data...</div>
</div>

<div class="nav-bar">
    <div class="filter-group">
        <div class="dropdown" id="dd-process"><button class="dd-btn" onclick="toggleDD('dd-process')">Process</button><div class="dd-menu" id="list-process"></div></div>
        <div class="dropdown" id="dd-trainer"><button class="dd-btn" onclick="toggleDD('dd-trainer')">Trainer</button><div class="dd-menu" id="list-trainer"></div></div>
        <div class="dropdown" id="dd-month"><button class="dd-btn" onclick="toggleDD('dd-month')">Month</button><div class="dd-menu" id="list-month"></div></div>
    </div>
    <button onclick="loadData(true)" style="padding:8px 15px; background:rgba(56,189,248,0.1); border:1px solid var(--accent); color:var(--accent); border-radius:6px; font-size:10px; font-weight:800; cursor:pointer;">REFRESH LIVE</button>
</div>

<div class="kpi-grid">
    <div class="card"><span class="c-l">Target HC</span><div class="c-v" id="k-target">0</div></div>
    <div class="card"><span class="c-l">Actual HC</span><div class="c-v" id="k-hc">0</div></div>
    <div class="card" style="border-left-color:var(--red)"><span class="c-l">Attrition</span><div class="c-v" id="k-at">0</div></div>
    <div class="card" style="border-left-color:var(--green)"><span class="c-l">Conversion</span><div class="c-v" id="k-cv">0%</div></div>
    <div class="card"><span class="c-l">Certification</span><div class="c-v" id="k-cert">0%</div></div>
    <div class="card"><span class="c-l">Total Days</span><div class="c-v" id="k-days">0</div></div>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    
    let RAW_DATA = [], FILTERS = { process: [], trainer: [], month: [] };

    window.onclick = (e) => { if (!e.target.closest('.dropdown')) document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open')); }
    function toggleDD(id) {
        const el = document.getElementById(id);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        if(!isOpen) el.classList.add('open');
    }

    async function loadData(isRef = false) {
        if(isRef) document.getElementById('loader').style.display = 'flex';
        try {
            const response = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
            const text = await response.text();
            
            // Robust parsing: handles quotes and commas in numbers
            const rows = text.split(/\r?\n/).map(r => {
                return r.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)?.map(m => m.replace(/^"|"$/g, '').trim()) || r.split(',').map(c => c.trim());
            });

            // FIND HEADER ROW (Searching for keywords to skip decorative headers)
            let hIdx = rows.findIndex(r => r.some(c => c.toLowerCase().includes("process") || c.toLowerCase().includes("trainer")));
            if(hIdx === -1) hIdx = 0;

            const header = rows[hIdx].map(h => h.toLowerCase());
            const find = (key) => header.findIndex(h => h.includes(key));

            const idx = {
                b: find("batch no"), p: find("process"), t: find("trainer"), 
                m: find("month"), tg: find("target"),
                hc: find("headcount"), at: find("attrition"), cr: find("certific"),
                d: find("days"), cv: find("conv")
            };

            RAW_DATA = rows.slice(hIdx + 1).map(c => {
                const n = (v) => parseFloat(String(v).replace(/[^0-9.]/g, '')) || 0;
                return {
                    batchNo: n(c[idx.b]), process: c[idx.p] || "Other", trainer: c[idx.t] || "Other",
                    month: c[idx.m] || "", target: n(c[idx.tg]),
                    hc: n(c[idx.hc]), at: n(c[idx.at]), cert: n(c[idx.cr]), days: n(c[idx.d]), cv: n(c[idx.cv])
                };
            }).filter(d => d.month && d.month.length > 2);

            renderSlicers(); updateDashboard();
        } catch (err) { console.error("Fetch Error:", err); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderSlicers() {
        Object.keys(FILTERS).forEach(key => {
            let items = [...new Set(RAW_DATA.map(d => d[key]))].filter(v => v).sort();
            const container = document.getElementById('list-' + key);
            container.innerHTML = items.map(v => `
                <div class="li ${FILTERS[key].includes(v)?'active':''}" onclick="event.stopPropagation();toggleFilter('${key}','${v.replace(/'/g, "\\'")}')">
                    <div class="chk"></div><span>${v}</span>
                </div>`).join('');
        });
    }

    function toggleFilter(k, v) {
        const i = FILTERS[k].indexOf(v);
        if(i > -1) FILTERS[k].splice(i, 1); else FILTERS[k].push(v);
        renderSlicers(); updateDashboard();
    }

    function updateDashboard() {
        const filtered = RAW_DATA.filter(d => 
            (!FILTERS.process.length || FILTERS.process.includes(d.process)) &&
            (!FILTERS.trainer.length || FILTERS.trainer.includes(d.trainer)) &&
            (!FILTERS.month.length || FILTERS.month.includes(d.month))
        );

        const sum = filtered.reduce((a, c) => {
            a.t += c.target; a.h += c.hc; a.a += c.at; a.v += c.cv; a.c += c.cert; a.d += c.days; return a;
        }, { t:0, h:0, a:0, v:0, c:0, d:0 });

        const avgCount = filtered.length || 1;
        
        // Header
        document.getElementById('h-batches').innerText = filtered.length;
        document.getElementById('h-hc').innerText = Math.round(sum.h).toLocaleString();
        document.getElementById('h-at').innerText = Math.round(sum.a).toLocaleString();
        document.getElementById('h-conv').innerText = (sum.v / avgCount).toFixed(1) + "%";

        // Cards
        document.getElementById('k-target').innerText = Math.round(sum.t).toLocaleString();
        document.getElementById('k-hc').innerText = Math.round(sum.h).toLocaleString();
        document.getElementById('k-at').innerText = Math.round(sum.a).toLocaleString();
        document.getElementById('k-cv').innerText = (sum.v / avgCount).toFixed(1) + "%";
        document.getElementById('k-cert').innerText = (sum.c / avgCount).toFixed(1) + "%";
        document.getElementById('k-days').innerText = Math.round(sum.d).toLocaleString();

        const bMin = filtered.length ? Math.min(...filtered.map(d => d.batchNo)) : 0;
        const bMax = filtered.length ? Math.max(...filtered.map(d => d.batchNo)) : 0;
        const trn = [...new Set(filtered.map(d => d.trainer))].length;
        const prc = [...new Set(filtered.map(d => d.process))].length;
        
        document.getElementById('h-bread-text').innerHTML = 
            `Batch <span>${bMin} → ${bMax}</span> · <span>${trn} Trainers</span> · <span>${prc} Processes</span>`;
    }

    loadData();
</script>
</body>
</html>
