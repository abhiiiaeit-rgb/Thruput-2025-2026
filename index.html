<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Analytics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap');
        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* Header Layout Fix */
        .header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .h-left-wrap { display: flex; align-items: center; gap: 40px; }
        .sheet-name { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; white-space: nowrap; border-right: 1px solid var(--border); padding-right: 30px; }
        
        .h-stats { display: flex; gap: 25px; align-items: center; }
        .hs-item { text-align: left; }
        .hs-v { display: block; font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono'; }
        .hs-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
        
        .h-bread { text-align: right; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-dim); max-width: 400px; }
        .h-bread span { color: var(--accent); }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 30px; background: #090c10; border-bottom: 1px solid var(--border); }
        .filter-group { display: flex; gap: 10px; }
        .dropdown { position: relative; width: 140px; }
        .dd-btn { width: 100%; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; text-align: left; font-size: 11px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .dd-menu { position: absolute; top: 115%; left: 0; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; max-height: 280px; overflow-y: auto; display: none; z-index: 1001; }
        .dropdown.open .dd-menu { display: block; }
        .li { padding: 8px 12px; display: flex; align-items: center; gap: 10px; font-size: 11px; cursor: pointer; color: var(--text-dim); }
        .li:hover { background: #21262d; color: var(--text); }
        .chk { width: 12px; height: 12px; border: 1px solid var(--border); border-radius: 2px; }
        .li.active .chk { background: var(--accent); border-color: var(--accent); }

        .btn-box { display: flex; gap: 8px; }
        .btn { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid var(--border); }
        .btn-live { background: rgba(56, 189, 248, 0.1); color: var(--accent); }
        .btn-reset { background: rgba(248, 81, 73, 0.1); color: var(--red); }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 20px 30px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .c-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; display: block; }
        .c-v { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono'; }

        .tag-area { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 30px 10px 30px; min-height: 30px; }
        .tag { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); color: var(--accent); padding: 3px 8px; border-radius: 4px; font-size: 10px; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 30px; height: 30px; border: 3px solid #30363d; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="font-size:11px; color:var(--text-dim); margin-top:10px">SCANNING SHEET DATA...</p></div>

<div class="header">
    <div class="h-left-wrap">
        <div class="sheet-name">OJT Analytics</div>
        <div class="h-stats">
            <div class="hs-item"><span class="hs-v" id="h-batches">0</span><span class="hs-l">Batches</span></div>
            <div class="hs-item"><span class="hs-v" id="h-hc" style="color:var(--accent)">0</span><span class="hs-l">Headcount</span></div>
            <div class="hs-item"><span class="hs-v" id="h-at" style="color:var(--red)">0</span><span class="hs-l">Attrition</span></div>
            <div class="hs-item"><span class="hs-v" id="h-conv" style="color:var(--green)">0%</span><span class="hs-l">Avg Conv%</span></div>
        </div>
    </div>
    <div class="h-bread" id="h-bread-text">--</div>
</div>

<div class="nav-bar">
    <div class="filter-group">
        <div class="dropdown" id="dd-process"><button class="dd-btn" onclick="toggleDD('dd-process')">Process</button><div class="dd-menu" id="list-process"></div></div>
        <div class="dropdown" id="dd-trainer"><button class="dd-btn" onclick="toggleDD('dd-trainer')">Trainer</button><div class="dd-menu" id="list-trainer"></div></div>
        <div class="dropdown" id="dd-type"><button class="dd-btn" onclick="toggleDD('dd-type')">Type</button><div class="dd-menu" id="list-type"></div></div>
        <div class="dropdown" id="dd-month"><button class="dd-btn" onclick="toggleDD('dd-month')">Month</button><div class="dd-menu" id="list-month"></div></div>
    </div>
    <div class="btn-box">
        <button class="btn btn-live" onclick="loadData(true)">⚡ Refresh</button>
        <button class="btn btn-reset" onclick="resetAll()">✕ Reset</button>
    </div>
</div>

<div class="tag-area" id="tag-box"></div>

<div class="kpi-grid">
    <div class="card"><span class="c-l">Target HC</span><div class="c-v" id="k-target">0</div></div>
    <div class="card"><span class="c-l">Actual HC</span><div class="c-v" id="k-hc">0</div></div>
    <div class="card" style="border-left-color:var(--red)"><span class="c-l">Attrition Count</span><div class="c-v" id="k-at">0</div></div>
    <div class="card" style="border-left-color:var(--green)"><span class="c-l">Conversion %</span><div class="c-v" id="k-cv">0%</div></div>
    <div class="card"><span class="c-l">Cert %</span><div class="c-v" id="k-cert">0%</div></div>
    <div class="card"><span class="c-l">Days</span><div class="c-v" id="k-days">0</div></div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";
    const MONTH_MAP = {"Jan":0,"Feb":1,"Mar":2,"Apr":3,"May":4,"Jun":5,"Jul":6,"Aug":7,"Sep":8,"Oct":9,"Nov":10,"Dec":11};
    let RAW_DATA = [], FILTERS = { process: [], trainer: [], type: [], month: [] };

    window.onclick = (e) => { if (!e.target.closest('.dropdown')) document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open')); }
    function toggleDD(id) {
        const el = document.getElementById(id);
        const open = el.classList.contains('open');
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        if(!open) el.classList.add('open');
    }

    async function loadData(ref = false) {
        if(ref) document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch(`${URL}&cb=${Date.now()}`);
            const text = await res.text();
            const allRows = text.split(/\r?\n/).map(r => r.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            
            // Smart Row Hunter: Find the first row that contains "Process" or "Month"
            let headIdx = allRows.findIndex(r => r.some(c => c.toLowerCase().includes("process") || c.toLowerCase().includes("month")));
            if(headIdx === -1) headIdx = 0;

            const header = allRows[headIdx].map(h => h.toLowerCase());
            const find = (k) => header.findIndex(h => h.includes(k));

            const idx = {
                b: find("batch no"), p: find("process"), t: find("trainer"), 
                y: find("batch type"), m: find("month"), tg: find("target headcount"),
                hc: find("headcount"), at: find("attrition"), cr: find("certification"),
                d: find("training days"), cv: find("conversion")
            };

            RAW_DATA = allRows.slice(headIdx + 1).map(c => {
                const n = (v) => parseFloat(v?.replace(/,/g, '')) || 0;
                return {
                    batchNo: n(c[idx.b]), process: c[idx.p] || "N/A", trainer: c[idx.t] || "N/A",
                    type: c[idx.y] || "N/A", month: c[idx.m] || "", target: n(c[idx.tg]),
                    hc: n(c[idx.hc]), at: n(c[idx.at]), cert: n(c[idx.cr]), days: n(c[idx.d]), cv: n(c[idx.cv])
                };
            }).filter(d => d.month && d.month !== "Month");

            renderSlicers(); updateDashboard();
        } catch (e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderSlicers() {
        Object.keys(FILTERS).forEach(key => {
            let items = [...new Set(RAW_DATA.map(d => d[key]))].filter(v => v && v !== "N/A");
            if(key === 'month') items.sort((a,b) => {
                const [mA, yA] = a.split("'"); const [mB, yB] = b.split("'");
                return (parseInt(yA) - parseInt(yB)) || (MONTH_MAP[mA] - MONTH_MAP[mB]);
            }); else items.sort();
            document.getElementById('list-' + key).innerHTML = items.map(v => `
                <div class="li ${FILTERS[key].includes(v)?'active':''}" onclick="event.stopPropagation();toggleFilter('${key}','${v}')">
                    <div class="chk"></div><span>${v}</span>
                </div>`).join('');
        });
    }

    function toggleFilter(k, v) {
        const i = FILTERS[k].indexOf(v);
        if(i > -1) FILTERS[k].splice(i,1); else FILTERS[k].push(v);
        renderSlicers(); updateDashboard();
    }

    function resetAll() {
        FILTERS = { process: [], trainer: [], type: [], month: [] };
        renderSlicers(); updateDashboard();
    }

    function updateDashboard() {
        const data = RAW_DATA.filter(d => 
            (!FILTERS.process.length || FILTERS.process.includes(d.process)) &&
            (!FILTERS.type.length || FILTERS.type.includes(d.type)) &&
            (!FILTERS.trainer.length || FILTERS.trainer.includes(d.trainer)) &&
            (!FILTERS.month.length || FILTERS.month.includes(d.month))
        );

        const s = data.reduce((a, c) => {
            a.t += c.target; a.h += c.hc; a.a += c.at; a.v += c.cv; a.c += c.cert; a.d += c.days; return a;
        }, { t:0, h:0, a:0, v:0, c:0, d:0 });

        const count = data.length || 1;
        document.getElementById('h-batches').innerText = data.length;
        document.getElementById('h-hc').innerText = Math.round(s.h).toLocaleString();
        document.getElementById('h-at').innerText = Math.round(s.a).toLocaleString();
        document.getElementById('h-conv').innerText = (s.v / count).toFixed(1) + "%";

        document.getElementById('k-target').innerText = Math.round(s.t).toLocaleString();
        document.getElementById('k-hc').innerText = Math.round(s.h).toLocaleString();
        document.getElementById('k-at').innerText = Math.round(s.a).toLocaleString();
        document.getElementById('k-cv').innerText = (s.v / count).toFixed(1) + "%";
        document.getElementById('k-cert').innerText = (s.c / count).toFixed(1) + "%";
        document.getElementById('k-days').innerText = Math.round(s.d).toLocaleString();

        const bMin = data.length ? Math.min(...data.map(d => d.batchNo)) : 0;
        const bMax = data.length ? Math.max(...data.map(d => d.batchNo)) : 0;
        const trn = [...new Set(data.map(d => d.trainer))].length;
        const prc = [...new Set(data.map(d => d.process))].length;
        document.getElementById('h-bread-text').innerHTML = `Batch <span>${bMin} → ${bMax}</span> · <span>${trn} Trainers</span> · <span>${prc} Processes</span>`;

        const box = document.getElementById('tag-box');
        box.innerHTML = FILTERS.process.concat(FILTERS.trainer, FILTERS.type, FILTERS.month).map(v => `<div class="tag">${v}</div>`).join('');
    }

    loadData();
</script>
</body>
</html>
