<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>OJT Training Dashboard</title><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script><style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');:root{--bg:#0c0f1a;--surface:#141824;--surface2:#1c2235;--surface3:#232b42;--border:#2a3450;--border2:#3a4a6a;--text:#e8edf5;--text2:#8a9bc4;--text3:#5a6a8a;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#2dd4a0;--amber:#f5a623;--red:#f05a5a;--r:12px;--rs:8px;}*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}.header{background:linear-gradient(135deg,#0d1530 0%,#1a2550 50%,#0d1530 100%);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}.header h1{font-size:19px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 0%,#8ab4f8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.hstats{display:flex;gap:20px;}.hstat .v{font-size:20px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;text-align:center;}.hstat .l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;text-align:center;}.slicer-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;position:sticky;top:57px;z-index:150;}.dd-wrap{display:flex;flex-direction:column;gap:4px;position:relative;}.dd-wrap label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}.dd-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:var(--rs);padding:6px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:150px;}.dd-panel{position:absolute;top:calc(100% + 4px);left:0;min-width:200px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);z-index:300;display:none;flex-direction:column;overflow:hidden;}.dd-panel.open{display:flex;}.dd-list{max-height:200px;overflow-y:auto;padding:4px 0;}.dd-item{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;}.dd-item:hover{background:var(--surface3);}.dd-item input{accent-color:var(--accent);}.btn-reset{background:var(--surface3);border:1px solid var(--border2);color:var(--text2);border-radius:var(--rs);padding:6px 14px;cursor:pointer;font-size:12px;}.btn-reset:hover{background:var(--accent);color:#fff;}.main{padding:20px 24px;}.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;position:relative;}.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}.kpi-card .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;margin-bottom:5px;}.kpi-card .val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;}</style></head><body>

<div class="header">
    <div><h1>OJT Training Dashboard</h1><p>Live Google Sheet Connection</p></div>
    <div class="hstats">
        <div class="hstat"><div class="v" id="hTotal">0</div><div class="l">Batches</div></div>
        <div class="hstat"><div class="v" id="hHC">0</div><div class="l">Headcount</div></div>
        <div class="hstat"><div class="v" id="hConv">0%</div><div class="l">Avg Conv%</div></div>
    </div>
</div>

<div class="slicer-bar">
    <div class="dd-wrap"><label>Batch</label><button class="dd-btn" onclick="toggleDD('dd-batch')"><span id="lbl-batch">All</span> ▾</button><div id="dd-batch" class="dd-panel"><div class="dd-list" id="list-batch"></div></div></div>
    <div class="dd-wrap"><label>Process</label><button class="dd-btn" onclick="toggleDD('dd-process')"><span id="lbl-process">All</span> ▾</button><div id="dd-process" class="dd-panel"><div class="dd-list" id="list-process"></div></div></div>
    <div class="dd-wrap"><label>Trainer</label><button class="dd-btn" onclick="toggleDD('dd-trainer')"><span id="lbl-trainer">All</span> ▾</button><div id="dd-trainer" class="dd-panel"><div class="dd-list" id="list-trainer"></div></div></div>
    <div class="dd-wrap"><label>Month</label><button class="dd-btn" onclick="toggleDD('dd-month')"><span id="lbl-month">All</span> ▾</button><div id="dd-month" class="dd-panel"><div class="dd-list" id="list-month"></div></div></div>
    
    <div class="dd-wrap"><label>Batch Type</label><button class="dd-btn" onclick="toggleDD('dd-batchtype')"><span id="lbl-batchtype">All</span> ▾</button><div id="dd-batchtype" class="dd-panel"><div class="dd-list" id="list-batchtype"></div></div></div>

    <button class="btn-reset" onclick="resetFilters()">↺ Reset All</button>
</div>

<div class="main">
    <div class="kpi-grid">
        <div class="kpi-card"><div class="lbl">Total Batches</div><div class="val" id="kpi-batches">0</div></div>
        <div class="kpi-card"><div class="lbl">Total Headcount</div><div class="val" id="kpi-hc">0</div></div>
        <div class="kpi-card"><div class="lbl">Avg Conversion</div><div class="val" id="kpi-conv">0%</div></div>
    </div>
</div>

<script>
    // 1. PASTE YOUR CSV LINK HERE
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv";

    let RAW_DATA = [];
    let filters = { batch: [], process: [], trainer: [], month: [], batchtype: [] };

    async function fetchData() {
        try {
            const response = await fetch(sheetURL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            
            RAW_DATA = rows.map(row => {
                const cols = row.split(',');
                return {
                    batch: cols[0]?.trim(),
                    process: cols[1]?.trim(),
                    trainer: cols[2]?.trim(),
                    month: cols[5]?.trim(),      // Adjust if Column F is different
                    batch_type: cols[4]?.trim(), // Column E is Index 4
                    hc: parseFloat(cols[8]) || 0,
                    conv: parseFloat(cols[19]) || 0
                };
            }).filter(d => d.batch);

            populateFilters();
            updateDashboard();
        } catch (e) { console.error("Sheet Load Error:", e); }
    }

    function populateFilters() {
        const createItems = (key, dataField, divId) => {
            const vals = [...new Set(RAW_DATA.map(d => d[dataField]))].filter(Boolean).sort();
            document.getElementById('list-' + divId).innerHTML = vals.map(v => `
                <div class="dd-item" onclick="toggleFilter('${key}', '${v}')">
                    <input type="checkbox" id="chk-${key}-${v}"><span>${v}</span>
                </div>
            `).join('');
        };
        createItems('batch', 'batch', 'batch');
        createItems('process', 'process', 'process');
        createItems('trainer', 'trainer', 'trainer');
        createItems('month', 'month', 'month');
        createItems('batchtype', 'batch_type', 'batchtype');
    }

    function toggleFilter(key, val) {
        const idx = filters[key].indexOf(val);
        if(idx > -1) filters[key].splice(idx, 1);
        else filters[key].push(val);
        document.getElementById(`chk-${key}-${val}`).checked = filters[key].includes(val);
        document.getElementById(`lbl-${key}`).innerText = filters[key].length ? filters[key].length + ' Selected' : 'All';
        updateDashboard();
    }

    function updateDashboard() {
        const filtered = RAW_DATA.filter(d => 
            (!filters.batch.length || filters.batch.includes(d.batch)) &&
            (!filters.process.length || filters.process.includes(d.process)) &&
            (!filters.trainer.length || filters.trainer.includes(d.trainer)) &&
            (!filters.month.length || filters.month.includes(d.month)) &&
            (!filters.batchtype.length || filters.batchtype.includes(d.batch_type))
        );

        document.getElementById('hTotal').innerText = filtered.length;
        document.getElementById('kpi-batches').innerText = filtered.length;
        document.getElementById('hHC').innerText = filtered.reduce((s, d) => s + d.hc, 0);
        document.getElementById('kpi-hc').innerText = filtered.reduce((s, d) => s + d.hc, 0);
        
        const avg = filtered.length ? (filtered.reduce((s, d) => s + d.conv, 0) / filtered.length * 100).toFixed(1) : 0;
        document.getElementById('hConv').innerText = avg + '%';
        document.getElementById('kpi-conv').innerText = avg + '%';
    }

    function toggleDD(id) {
        const el = document.getElementById(id);
        const isOpen = el.classList.contains('open');
        document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('open'));
        if(!isOpen) el.classList.add('open');
    }

    function resetFilters() {
        location.reload();
    }

    window.onclick = e => { if(!e.target.closest('.dd-wrap')) document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('open')); };

    fetchData();
</script></body></html>
