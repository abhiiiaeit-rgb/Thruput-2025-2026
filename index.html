<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJT Training Dashboard - Fixed Slicers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap');
        
        :root {
            --bg: #0d1117; --surface: #161b22; --accent: #38bdf8;
            --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
            --red: #f85149; --green: #3fb950;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }

        /* Header */
        .header { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); }
        .h-left h1 { font-size: 18px; font-weight: 600; color: var(--text); }
        .top-metrics { display: flex; gap: 40px; }
        .tm-item { text-align: right; }
        .tm-v { display: block; font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono'; color: var(--accent); }
        .tm-l { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* Slicer Grid - Matches your 2nd image style */
        .slicer-container { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            padding: 20px 30px; 
            background: #090c10;
        }

        .slicer-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            height: 220px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .slicer-header {
            padding: 10px 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .slicer-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        /* Tick Selection Item */
        .list-item {
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .list-item:hover { background: #21262d; }
        
        .tick-box {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .list-item.selected .tick-box {
            background: var(--accent);
            border-color: var(--accent);
        }

        .list-item.selected .tick-box::after {
            content: '✓';
            color: #000;
            font-size: 11px;
            font-weight: 900;
        }

        .list-item.selected span {
            color: var(--text);
            font-weight: 600;
        }

        /* KPI Cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; padding: 0 30px; margin-top: 10px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 10px; position: relative; }
        .card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); border-radius: 10px 0 0 10px; }
        .card.red::after { background: var(--red); }
        .card.green::after { background: var(--green); }
        
        .c-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 15px; display: block; }
        .c-value { font-size: 34px; font-weight: 700; font-family: 'JetBrains Mono'; }

        .btn-reset { 
            background: transparent; border: 1px solid var(--border); color: var(--text-dim); 
            padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: 0.3s;
        }
        .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div id="loader">Fetching Live Data...</div>

<div class="header">
    <div class="h-left"><h1>OJT Operational Dashboard</h1></div>
    <div class="top-metrics">
        <div class="tm-item"><span class="tm-v" id="h-hc">0</span><span class="tm-l">Headcount</span></div>
        <div class="tm-item"><span class="tm-v" id="h-at">0</span><span class="tm-l">Attrition</span></div>
        <button class="btn-reset" onclick="location.reload()">↺ Reset Data</button>
    </div>
</div>

<div class="slicer-container">
    <div class="slicer-box">
        <div class="slicer-header">🏭 Process</div>
        <div class="slicer-list" id="list-process"></div>
    </div>
    <div class="slicer-box">
        <div class="slicer-header">⚡ Batch Type</div>
        <div class="slicer-list" id="list-type"></div>
    </div>
    <div class="slicer-box">
        <div class="slicer-header">👤 Trainer</div>
        <div class="slicer-list" id="list-trainer"></div>
    </div>
    <div class="slicer-box">
        <div class="slicer-header">📅 Timeline (Monthly)</div>
        <div class="slicer-list" id="list-month"></div>
    </div>
</div>

<div class="kpi-grid">
    <div class="card"><span class="c-label">Total Batches</span><div class="c-value" id="k-batches">0</div></div>
    <div class="card"><span class="c-label">Total Headcount</span><div class="c-value" id="k-hc">0</div></div>
    <div class="card red"><span class="c-label">Total Attrition</span><div class="c-value" id="k-at">0</div></div>
    <div class="card green"><span class="c-label">Avg Conversion</span><div class="c-value" id="k-cv">0%</div></div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSbuV6t-gxHvr0aN9asRdWBs0arjftIJ6k5hcpviihyk46Jpcd_9OPueR1LkE1rgS_kVHfoRIKTifxV/pub?gid=2099952935&single=true&output=csv&t=" + Date.now();
    const MONTH_ORDER = {"Jan":0, "Feb":1, "Mar":2, "Apr":3, "May":4, "Jun":5, "Jul":6, "Aug":7, "Sep":8, "Oct":9, "Nov":10, "Dec":11};
    
    let RAW_DATA = [];
    let FILTERS = { process: [], type: [], trainer: [], month: [] };

    async function loadData() {
        try {
            const res = await fetch(URL);
            const csv = await res.text();
            const rows = csv.split(/\r?\n/).map(row => row.split(','));

            RAW_DATA = rows.slice(1).map(c => ({
                process: (c[1] || "").trim(),
                trainer: (c[2] || "").trim(),
                type: (c[4] || "").trim(),
                month: (c[5] || "").trim(),
                hc: parseFloat(c[8]) || 0,
                attr: parseFloat(c[10]) || 0,
                conv: parseFloat(c[19]) || 0
            })).filter(d => d.month !== "");

            document.getElementById('loader').style.display = 'none';
            renderAllSlicers();
            updateDashboard();
        } catch (e) {
            console.error("CSV Load Failed");
        }
    }

    function renderAllSlicers() {
        Object.keys(FILTERS).forEach(key => {
            let items = [...new Set(RAW_DATA.map(d => d[key]))].filter(v => v);
            
            // Year-First Monthly Sort
            if(key === 'month') {
                items.sort((a,b) => {
                    const [mA, yA] = a.split("'");
                    const [mB, yB] = b.split("'");
                    return (parseInt(yA) - parseInt(yB)) || (MONTH_ORDER[mA] - MONTH_ORDER[mB]);
                });
            } else { items.sort(); }

            const container = document.getElementById('list-' + key);
            container.innerHTML = items.map(val => `
                <div class="list-item ${FILTERS[key].includes(val) ? 'selected' : ''}" onclick="toggleFilter('${key}', '${val}')">
                    <div class="tick-box"></div>
                    <span>${val}</span>
                </div>
            `).join('');
        });
    }

    function toggleFilter(key, val) {
        const idx = FILTERS[key].indexOf(val);
        if(idx > -1) FILTERS[key].splice(idx, 1);
        else FILTERS[key].push(val);
        
        renderAllSlicers();
        updateDashboard();
    }

    function updateDashboard() {
        const filtered = RAW_DATA.filter(d => 
            (!FILTERS.process.length || FILTERS.process.includes(d.process)) &&
            (!FILTERS.type.length || FILTERS.type.includes(d.type)) &&
            (!FILTERS.trainer.length || FILTERS.trainer.includes(d.trainer)) &&
            (!FILTERS.month.length || FILTERS.month.includes(d.month))
        );

        const sums = filtered.reduce((a, c) => {
            a.hc += c.hc; a.at += c.attr; a.cv += c.conv; return a;
        }, { hc:0, at:0, cv:0 });

        const avgCv = filtered.length ? (sums.cv / filtered.length).toFixed(1) : 0;

        document.getElementById('h-hc').innerText = Math.round(sums.hc);
        document.getElementById('h-at').innerText = Math.round(sums.at);
        document.getElementById('k-batches').innerText = filtered.length;
        document.getElementById('k-hc').innerText = Math.round(sums.hc);
        document.getElementById('k-at').innerText = Math.round(sums.at);
        document.getElementById('k-cv').innerText = avgCv + "%";
    }

    loadData();
</script>
</body>
</html>
